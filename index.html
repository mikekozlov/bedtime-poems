_(Есенин)", "sourceName": "Русская Викитека", "moodTags": ["утро", "нежность", "лёгкое"], "brief": "Стихотворение, которое буквально называется «С добрым утром!» — и целиком про то, как просыпается речная заводь: дремлют золотые звёзды, улыбаются сонные берёзки, растрепав шёлковые косы. А в конце даже колючая крапива у плетня «шепчет шаловливо» это самое приветствие. Есенин отдаёт «доброе утро» самой природе — отправь его, и оно прозвучит от всего проснувшегося мира сразу.", "section": "morning"}, {"id": "morn-esenin-cheremuha", "title": "Черёмуха", "author": "Сергей Есенин", "authorYears": "1895–1925", "country": "Россия", "year": "1915", "text": "Черёмуха душистая\nС весною расцвела\nИ ветки золотистые,\nЧто кудри, завила.\nКругом роса медвяная\nСползает по коре,\nПод нею зелень пряная\nСияет в серебре.\nА рядом, у проталинки,\nВ траве, между корней,\nБежит, струится маленький\nСеребряный ручей.\nЧерёмуха душистая,\nРазвесившись, стоит,\nА зелень золотистая\nНа солнышке горит.\nРучей волной гремучею\nВсе ветки обдаёт\nИ вкрадчиво под кручею\nЕй песенки поёт.", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Черёмуха_(Есенин)", "sourceName": "Русская Викитека", "moodTags": ["природа", "любование", "нежность"], "brief": "Ранний Есенин пишет черёмуху как влюблённую девушку: расцвела, «ветки золотистые, что кудри, завила», стоит вся в медвяной росе и серебре. А рядом бежит маленький серебряный ручей и «вкрадчиво… ей песенки поёт» — целая нежная сценка ухаживания среди весеннего утра. Свежо, душисто и совсем без тяжести — как глоток весеннего воздуха с утра.", "section": "morning"}, {"id": "morn-nikitin-utro", "title": "Утро", "author": "Иван Никитин", "authorYears": "1824–1861", "country": "Россия", "year": "1854", "text": "Звёзды меркнут и гаснут. В огне облака.\nБелый пар по лугам расстилается.\nПо зеркальной воде, по кудрям лозняка\nОт зари алый свет разливается.\nДремлет чуткий камыш. Тишь — безлюдье вокруг.\nЧуть приметна тропинка росистая.\nКуст заденешь плечом — на лицо тебе вдруг\nС листьев брызнет роса серебристая.\nПотянул ветерок, воду морщит-рябит.\nПронеслись утки с шумом и скрылися.\nДалеко-далеко колокольчик звенит.\nРыбаки в шалаше пробудилися,\nСняли сети с шестов, вёсла к лодкам несут…\nА восток всё горит-разгорается.\nПтички солнышка ждут, птички песни поют,\nИ стоит себе лес, улыбается.\nВот и солнце встаёт, из-за пашен блестит,\nЗа морями ночлег свой покинуло,\nНа поля, на луга, на макушки ракит\nЗолотыми потоками хлынуло.\nЕдет пахарь с сохой, едет — песню поёт;\nПо плечу молодцу всё тяжёлое…\nНе боли ты, душа! отдохни от забот!\nЗдравствуй, солнце да утро весёлое!", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Утро_(Никитин)", "sourceName": "Русская Викитека", "moodTags": ["утро", "природа", "покой"], "brief": "Хрестоматийное русское утро, снятое минута за минутой: «звёзды меркнут и гаснут», по лугам стелется белый пар, роса серебристо брызжет с листьев, просыпаются рыбаки — и вот солнце «золотыми потоками хлынуло» на поля. Никитин ведёт от предрассветной тишины к полному свету так, что вместе с миром просыпаешься сам. И финальная строчка — готовое пожелание: «Здравствуй, солнце да утро весёлое!»", "section": "morning"}, {"id": "morn-tyutchev-vesennyaya-groza", "title": "Весенняя гроза", "author": "Фёдор Тютчев", "authorYears": "1803–1873", "country": "Россия", "year": "1828", "text": "Люблю грозу в начале мая,\nКогда весенний, первый гром,\nКак бы резвяся и играя,\nГрохочет в небе голубом.\n\nГремят раскаты молодые!\nВот дождик брызнул, пыль летит…\nПовисли перлы дождевые,\nИ солнце нити золотит…\n\nС горы бежит поток проворный,\nВ лесу не молкнет птичий гам,\nИ гам лесной, и шум нагорный —\nВсё вторит весело громам…\n\nТы скажешь: ветреная Геба,\nКормя Зевесова орла,\nГромокипящий кубок с неба,\nСмеясь, на землю пролила!", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Весенняя_гроза_(Тютчев)", "sourceName": "Русская Викитека", "moodTags": ["природа", "любование", "лёгкое"], "brief": "Самая жизнерадостная гроза в русской поэзии: майский гром «резвяся и играя» грохочет в голубом небе, а солнце золотит нити дождя. Всё здесь молодое и весёлое — раскаты, поток с горы, птичий гам, — а под конец Тютчев и вовсе превращает грозу в шалость богини Гебы, со смехом пролившей кубок с неба. Заряд свежести и радости на весь день.", "section": "morning"}, {"id": "morn-tyutchev-vesennie-vody", "title": "Весенние воды", "author": "Фёдор Тютчев", "authorYears": "1803–1873", "country": "Россия", "year": "1830", "text": "Ещё в полях белеет снег,\nА воды уж весной шумят —\nБегут и будят сонный брег,\nБегут и блещут и гласят —\n\nОни гласят во все концы:\n«Весна идёт, весна идёт!\nМы молодой весны гонцы,\nОна нас выслала вперёд».\n\nВесна идёт, весна идёт!\nИ тихих, тёплых майских дней\nРумяный, светлый хоровод\nТолпится весело за ней!", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Весенние_воды_(Тютчев)", "sourceName": "Русская Викитека", "moodTags": ["природа", "мечта", "любование"], "brief": "Ещё лежит снег, а талые воды уже бегут, «будят сонный брег» и звонко кричат во все концы: «Весна идёт!» Тютчев делает из ручьёв весёлых гонцов, за которыми спешит «румяный, светлый хоровод» тёплых майских дней. Стихотворение-предвкушение — его хорошо посылать в то утро, когда самому хочется поверить, что хорошее уже в пути.", "section": "morning"}, {"id": "morn-tyutchev-zima-nedarom", "title": "Зима недаром злится", "author": "Фёдор Тютчев", "authorYears": "1803–1873", "country": "Россия", "year": "1836", "text": "Зима недаром злится,\nПрошла её пора —\nВесна в окно стучится\nИ гонит со двора.\n\nИ всё засуетилось,\nВсё нудит Зиму вон —\nИ жаворонки в небе\nУж подняли трезвон.\n\nЗима ещё хлопочет\nИ на Весну ворчит:\nТа ей в глаза хохочет\nИ пуще лишь шумит…\n\nВзбесилась ведьма злая\nИ, снегу захватя,\nПустила, убегая,\nВ прекрасное дитя…\n\nВесне и горя мало:\nУмылася в снегу\nИ лишь румяней стала\nНаперекор врагу.", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Зима_недаром_злится_(Тютчев)", "sourceName": "Русская Викитека", "moodTags": ["лёгкое", "природа", "любование"], "brief": "Весёлая семейная перебранка времён года: сердитая Зима ворчит и швыряет снег, а юная Весна «в глаза хохочет» и только румянее становится. Жаворонки уже подняли в небе трезвон — и ясно, чья берёт. Озорной, улыбчивый стих о том, что светлое всегда пересиливает; отличная утренняя доза оптимизма.", "section": "morning"}, {"id": "morn-tyutchev-utro-v-gorah", "title": "Утро в горах", "author": "Фёдор Тютчев", "authorYears": "1803–1873", "country": "Россия", "year": "1830", "text": "Лазурь небесная смеётся,\nНочной омытая грозой,\nИ между гор росисто вьётся\nДолина светлой полосой.\n\nЛишь высших гор до половины\nТуманы покрывают скат,\nКак бы воздушные руины\nВолшебством созданных палат.", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Утро_в_горах_(Тютчев)", "sourceName": "Русская Викитека", "moodTags": ["утро", "любование", "покой"], "brief": "Восемь строк утренней акварели: небо, «ночной омытое грозой», смеётся лазурью, долина росисто вьётся светлой полосой, а туманы на вершинах кажутся воздушными руинами волшебных палат. Тютчев не описывает — он показывает свежесть первого чистого часа после ночи. Прохладный, ясный привет для того, кто любит горы и рассветы.", "section": "morning"}, {"id": "morn-maykov-vesna-pervaya-rama", "title": "Весна! Выставляется первая рама", "author": "Аполлон Майков", "authorYears": "1821–1897", "country": "Россия", "year": "1854", "text": "Весна! Выставляется первая рама —\nИ в комнату шум ворвался,\nИ благовест ближнего храма,\nИ говор народа, и стук колеса.\n\nМне в душу повеяло жизнью и волей:\nВон — даль голубая видна…\nИ хочется в поле, в широкое поле,\nГде, шествуя, сыплет цветами весна!", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Весна!_Выставляется_первая_рама_(Майков)", "sourceName": "Русская Викитека", "moodTags": ["природа", "мечта", "лёгкое"], "brief": "Один точный жест — выставили первую весеннюю раму — и вместе с воздухом в комнату «ворвался» весь мир: благовест, говор народа, стук колёс. В душу «повеяло жизнью и волей», и уже неудержимо тянет в широкое поле, где весна «шествуя, сыплет цветами». Стихотворение о том утреннем чувстве, когда хочется распахнуть всё и жить.", "section": "morning"}, {"id": "morn-maykov-lastochka-primchalas", "title": "Ласточка примчалась", "author": "Аполлон Майков", "authorYears": "1821–1897", "country": "Россия", "year": "1858", "text": "Ласточка примчалась\nИз-за бела моря,\nСела и запела:\nКак февраль ни злися,\nКак ты, март, ни хмурься,\nБудь хоть снег, хоть дождик —\nВсё весною пахнет!", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Ласточка_примчалась_(Майков)", "sourceName": "Русская Викитека", "moodTags": ["лёгкое", "природа", "мечта"], "brief": "Семь коротких строк, лёгких, как сама ласточка: она примчалась из-за моря, села и пропела маленький упрямый гимн весне — как ни злись февраль, как ни хмурься март, «всё весною пахнет!» Народная, песенная интонация делает стих почти считалочкой. Крошечный заряд бодрости, чтобы отправить в промозглое утро и напомнить: тепло уже на подходе.", "section": "morning"}, {"id": "morn-maykov-rassvet", "title": "Рассвет", "author": "Аполлон Майков", "authorYears": "1821–1897", "country": "Россия", "year": "1859", "text": "Вот — полосой зеленоватой\nУж обозначился восток;\nТуда тепло и ароматы\nПомчал со степи ветерок;\n\nБледнеют тверди голубые;\nНа горизонте — всё черней\nФигуры, словно вырезные,\nВ степи пасущихся коней…", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Рассвет_(Майков)", "sourceName": "Русская Викитека", "moodTags": ["утро", "покой", "природа"], "brief": "Тихая степная зарисовка того мгновения, когда восток только «обозначился полосой зеленоватой», а ветерок уже помчал оттуда тепло и ароматы. На светлеющем небе чётко, «словно вырезные», проступают фигуры пасущихся коней. Ни одного громкого слова — просто прохладный, ароматный воздух самого начала дня.", "section": "morning"}, {"id": "morn-maykov-vesna-podsnezhnik", "title": "Весна («Голубенький, чистый…»)", "author": "Аполлон Майков", "authorYears": "1821–1897", "country": "Россия", "year": "1857", "text": "Голубенький, чистый\nПодснежник-цветок!\nА подле сквозистый,\nПоследний снежок…\n\nПоследние слёзы\nО горе былом\nИ первые грёзы\nО счастьи ином…", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Весна_(Голубенький,_чистый_—_Майков)", "sourceName": "Русская Викитека", "moodTags": ["нежность", "мечта", "светлая-грусть"], "brief": "Восемь тоненьких строк — как сам первый подснежник рядом с «последним снежком». Майков ловит нежный перелом настроения: «последние слёзы о горе былом и первые грёзы о счастьи ином». Крошечное стихотворение о том, как в начале весны душа сама собой поворачивается от прошлого к надежде — светлое, чтобы послать в утро, когда хочется начать заново.", "section": "morning"}, {"id": "morn-plescheev-tayet-sneg", "title": "Весна («Уж тает снег, бегут ручьи…»)", "author": "Алексей Плещеев", "authorYears": "1825–1893", "country": "Россия", "year": "1872", "text": "Уж тает снег, бегут ручьи,\nВ окно повеяло весною…\nЗасвищут скоро соловьи,\nИ лес оденется листвою!\n\nЧиста небесная лазурь,\nТеплей и ярче солнце стало,\nПора метелей злых и бурь\nОпять надолго миновала.\n\nИ сердце сильно так в груди\nСтучит, как будто ждёт чего-то,\nКак будто счастье впереди\nИ унесла зима заботы!\n\nВсе лица весело глядят.\n«Весна!» — читаешь в каждом взоре;\nИ тот, как празднику, ей рад,\nЧья жизнь — лишь тяжкий труд и горе.\n\nНо резвых деток звонкий смех\nИ беззаботных птичек пенье\nМне говорят — кто больше всех\nПрироды любит обновленье!", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Весна_(Уж_тает_снег,_бегут_ручьи_—_Плещеев)", "sourceName": "Русская Викитека", "moodTags": ["природа", "мечта", "лёгкое"], "brief": "Хрестоматийная весна Плещеева, вся на предчувствии: тает снег, «в окно повеяло весною», солнце стало теплей — и сердце стучит, «как будто счастье впереди». На всех лицах читаешь одно слово, и даже уставший от трудов человек радуется весне, как празднику. Простое, светлое стихотворение о том, что зима «унесла заботы».", "section": "morning"}, {"id": "morn-plescheev-zhavoronki", "title": "Весна («Песни жаворонков снова…»)", "author": "Алексей Плещеев", "authorYears": "1825–1893", "country": "Россия", "year": "1861", "text": "Песни жаворонков снова\nЗазвенели в вышине.\n«Гостья милая, здорово!» —\nГоворят они весне.\n\nУж теплее солнце греет,\nСтали краше небеса…\nСкоро всё зазеленеет —\nСтепи, рощи и леса.\n\nПозабудет бедный горе,\nРасцветёт душой старик…\nВ каждом сердце, в каждом взоре\nРадость вспыхнет хоть на миг.", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Весна_(Песни_жаворонков_снова_—_Плещеев)", "sourceName": "Русская Викитека", "moodTags": ["природа", "лёгкое", "мечта"], "brief": "Жаворонки снова звенят в вышине и приветствуют весну, как милую гостью: «Гостья милая, здорово!» Солнце греет теплее, небеса стали краше, и скоро «всё зазеленеет». Простая, звонкая радость, от которой, по Плещееву, «в каждом сердце, в каждом взоре радость вспыхнет хоть на миг» — как раз то, чем хорошо начать чей-то день.", "section": "morning"}, {"id": "morn-tolstoy-to-bylo-ranneyu-vesnoy", "title": "То было раннею весной", "author": "Алексей К. Толстой", "authorYears": "1817–1875", "country": "Россия", "year": "1871", "text": "То было раннею весной,\nТрава едва всходила,\nРучьи текли, не парил зной,\nИ зелень рощ сквозила;\n\nТруба пастушья поутру\nЕщё не пела звонко,\nИ в завитках ещё в бору\nБыл папоротник тонкий.\n\nТо было раннею весной,\nВ тени берёз то было,\nКогда с улыбкой предо мной\nТы очи опустила.\n\nТо на любовь мою в ответ\nТы опустила вежды —\nО жизнь! о лес! о солнца свет!\nО юность! о надежды!\n\nИ плакал я перед тобой,\nНа лик твой глядя милый,—\nТо было раннею весной,\nВ тени берёз то было!\n\nТо было в утро наших лет —\nО счастие! о слёзы!\nО лес! о жизнь! о солнца свет!\nО свежий дух берёзы!", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/То_было_раннею_весной_(А._К._Толстой)", "sourceName": "Русская Викитека", "moodTags": ["нежность", "любование", "светлая-грусть"], "brief": "Один из самых светлых романсов о любви и памяти: всё случилось «раннею весной», в тени берёз, когда она с улыбкой опустила глаза в ответ на его чувство. Толстой называет это «утром наших лет» — и стих захлёбывается благодарностью: «О жизнь! о лес! о солнца свет! о юность! о надежды!» Нежная, лучезарная тоска по началу — без единой тёмной ноты.", "section": "morning"}, {"id": "morn-tolstoy-zvonche-zhavoronka", "title": "Звонче жаворонка пенье", "author": "Алексей К. Толстой", "authorYears": "1817–1875", "country": "Россия", "year": "1858", "text": "Звонче жаворонка пенье,\nЯрче вешние цветы,\nСердце полно вдохновенья,\nНебо полно красоты.\n\nРазорвав тоски оковы,\nЦепи пошлые разбив,\nНабегает жизни новой\nТоржествующий прилив,\n\nИ звучит свежо и юно\nНовых сил могучий строй,\nКак натянутые струны\nМежду небом и землёй.", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Звонче_жаворонка_пенье_(А._К._Толстой)", "sourceName": "Русская Викитека", "moodTags": ["мечта", "любование", "лёгкое"], "brief": "Стихотворение-прилив: жаворонок звонче, цветы ярче, «сердце полно вдохновенья, небо полно красоты». Толстой пишет то весеннее чувство, когда «разорвав тоски оковы» на человека набегает «торжествующий прилив» новых сил, свежих и юных, как струна между небом и землёй. Бодрящий, окрыляющий текст — чтобы пожелать кому-то сил на целый день.", "section": "morning"}, {"id": "morn-whitman-kak-adam", "title": "Как Адам ранним утром", "author": "Уолт Уитмен", "authorYears": "1819–1892", "country": "США", "year": "1860", "text": "Как Адам ранним утром,\nВыхожу из ночной я беседки, освежённый сном,\nГлядите, как я прохожу, услышьте мой голос, приблизьтесь.\nПрикоснитесь ко мне, прикоснитесь ладонью руки\nДо тела, пока прохожу я,\nНе бойтесь, не страшно\nТело моё.", "isFullText": true, "copyright": "public-domain", "translator": "Константин Бальмонт (1867–1942)", "sourceUrl": "https://ru.wikisource.org/wiki/Как_Адам_ранним_утром_(Уитмен;_Бальмонт)", "sourceName": "Русская Викитека", "moodTags": ["утро", "чувственное", "нежность"], "brief": "Крошечное утреннее стихотворение Уитмена в переводе Бальмонта: человек выходит из ночи «освежённый сном», как Адам в первое утро мира, и просто, без стыда зовёт приблизиться и прикоснуться — «не бойтесь, не страшно тело моё». Тихая, светлая, чуть чувственная радость проснувшегося тела и целого нового дня. Единственная американская нота в утренней подборке — и очень нежная.", "section": "morning"}, {"id": "morn-bunin-dymitsya-pole", "title": "Дымится поле, рассвет белеет", "author": "Иван Бунин", "authorYears": "1870–1953", "country": "Россия", "year": "1901", "text": "Дымится поле, рассвет белеет,\nВ степи туманной кричат орлы,\nИ дико-звонок их плач голодный\nСреди холодной плывущей мглы.\n\nВ росе их крылья, в росе бурьяны,\nБлагоухают поля со сна…\nЗарёю сладок твой бодрый холод,\nТвой томный голод, — твой зов, весна!\n\nТы победила, — вся степь дымится,\nНад степью властно кричат орлы,\nИ тучи жарким горят пожаром,\nИ солнце шаром встаёт из мглы!", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Дымится_поле,_рассвет_белеет_(Бунин)", "sourceName": "Русская Викитека", "moodTags": ["утро", "природа", "любование"], "brief": "Бунинский рассвет — не тихий, а победный: поле дымится, «в степи туманной кричат орлы», поля «благоухают со сна», и в этом бодром холоде слышится «зов, весна!». Финал взлетает: «Ты победила… и солнце шаром встаёт из мглы!» Мощное, свежее утро большой степи — для того, кому нужен не убаюкивающий, а поднимающий заряд с самого раннего часа.", "section": "morning"}, {"id": "morn-bunin-kogda-derevya", "title": "Когда деревья в светлый майский день", "author": "Иван Бунин", "authorYears": "1870–1953", "country": "Россия", "year": "1898", "text": "Когда деревья в светлый майский день\nДорожки осыпают белым цветом\nИ ветерок в аллее, полной светом,\nСтруит листвы узорчатую тень,\nЯ свой привет из тихих деревень\nШлю девушкам и юношам-поэтам:\nПусть встретит жизнь их ласковым приветом,\nПусть будет светел их весенний день,\nПусть их мечты развеет белым цветом!", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Когда_деревья_в_светлый_майский_день_(Бунин)", "sourceName": "Русская Викитека", "moodTags": ["нежность", "мечта", "любование"], "brief": "Светлый майский сонет-благословение: когда деревья осыпают дорожки белым цветом, а ветерок «в аллее, полной светом», струит узорчатую тень, Бунин шлёт свой привет молодым — «пусть будет светел их весенний день». По сути, это готовое доброе напутствие в цветущее утро, отправленное от всей майской аллеи сразу.", "section": "morning"}, {"id": "morn-bunin-net-solntsa", "title": "Нет солнца, но светлы пруды", "author": "Иван Бунин", "authorYears": "1870–1953", "country": "Россия", "year": "1900", "text": "Нет солнца, но светлы пруды,\nСтоят зеркалами литыми,\nИ чаши недвижной воды\nСовсем бы казались пустыми,\nНо в них отразились сады.\n\nВот капля, как шляпка гвоздя,\nУпала — и, сотнями игол\nЗатоны прудов бороздя,\nСверкающий ливень запрыгал —\nИ сад зашумел от дождя.\n\nИ ветер, играя листвой,\nСмешал молодые берёзки,\nИ солнечный луч, как живой,\nЗажёг задрожавшие блёстки,\nА лужи налил синевой.\n\nВон радуга… Весело жить\nИ весело думать о небе,\nО солнце, о зреющем хлебе\nИ счастьем простым дорожить:\n\nС открытой бродить головой,\nГлядеть, как рассыпали дети\nВ беседке песок золотой…\nИного нет счастья на свете.", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Нет_солнца,_но_светлы_пруды_(Бунин)", "sourceName": "Русская Викитека", "moodTags": ["любование", "покой", "природа"], "brief": "Тихое утро без солнца, но всё равно светлое: пруды стоят «зеркалами литыми», проходит короткий сверкающий ливень, выглядывает радуга. И из этой простой картины Бунин выводит целую философию счастья: «Весело жить и весело думать о небе… и счастьем простым дорожить». Стихотворение о благодарности за обычный день — «иного нет счастья на свете».", "section": "morning"}, {"id": "morn-bunin-svezha-v-aprele", "title": "Свежа в апреле ранняя заря", "author": "Иван Бунин", "authorYears": "1870–1953", "country": "Россия", "year": "1906", "text": "Свежа в апреле ранняя заря.\nВ тени у хат хрустит ледок стеклянный.\nПричастницы к стенам монастыря\nНесут детей — исполнить долг желанный.\n\nПрими, Господь, счастливых матерей,\nОтверзи храм с блистающим престолом —\nИ у святых Своих дверей\nПокрой их звоном благостно-тяжёлым.", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Свежа_в_апреле_ранняя_заря_(Бунин)", "sourceName": "Русская Викитека", "moodTags": ["утро", "покой", "нежность"], "brief": "Восемь строк ясного апрельского утра: «свежа ранняя заря», в тени у хат ещё хрустит стеклянный ледок, а к монастырю идут счастливые матери с детьми. Бунин просит для них у неба благословения и «звона благостно-тяжёлого». Тихий, чистый и бережный рассвет — светлый утренний привет с оттенком благодарности.", "section": "morning"}, {"id": "morn-pushkin-ptichka", "title": "Птичка", "author": "Александр Пушкин", "authorYears": "1799–1837", "country": "Россия", "year": "1823", "text": "В чужбине свято наблюдаю\nРодной обычай старины:\nНа волю птичку выпускаю\nПри светлом празднике весны.\n\nЯ стал доступен утешенью;\nЗа что на Бога мне роптать,\nКогда хоть одному творенью\nЯ мог свободу даровать!", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Птичка_(Пушкин)", "sourceName": "Русская Викитека", "moodTags": ["лёгкое", "мечта", "нежность"], "brief": "Восемь светлых строк о маленьком добром обычае: на весенний праздник выпустить птичку на волю. Пушкин делает из этого крошечного жеста целую философию примирения с жизнью — «за что на Бога мне роптать, когда хоть одному творенью я мог свободу даровать!» Тёплый утренний привет о том, что подарить кому-то свободу и радость — само по себе счастье.", "section": "morning"}, {"id": "morn-pushkin-tucha", "title": "Туча", "author": "Александр Пушкин", "authorYears": "1799–1837", "country": "Россия", "year": "1835", "text": "Последняя туча рассеянной бури!\nОдна ты несёшься по ясной лазури,\nОдна ты наводишь унылую тень,\nОдна ты печалишь ликующий день.\n\nТы небо недавно кругом облегала,\nИ молния грозно тебя обвивала;\nИ ты издавала таинственный гром\nИ алчную землю поила дождём.\n\nДовольно, сокройся! Пора миновалась,\nЗемля освежилась, и буря промчалась,\nИ ветер, лаская листочки древес,\nТебя с успокоенных гонит небес.", "isFullText": true, "copyright": "public-domain", "translator": null, "sourceUrl": "https://ru.wikisource.org/wiki/Туча_(Пушкин)", "sourceName": "Русская Викитека", "moodTags": ["природа", "покой", "светлая-грусть"], "brief": "Стихотворение про то, как проходит непогода: последняя туча ещё «наводит унылую тень» на ликующий день, но буря уже промчалась, «земля освежилась», и лёгкий ветер, «лаская листочки древес», тихо гонит её с прояснившихся небес. Пушкин говорит с тучей ласково, почти по-доброму — и получается светлое напоминание, что любое ненастье уходит, а день остаётся ясным.", "section": "morning"}];
const BEDTIME = DATA.filter(p=>p.section!=="morning");
const MORNING = DATA.filter(p=>p.section==="morning");

const COUNTRY_META = {
  "Россия":{flag:"🇷🇺"},"Украина":{flag:"🇺🇦"},"Германия":{flag:"🇩🇪"},"Австрия":{flag:"🇦🇹"},
  "Франция":{flag:"🇫🇷"},"Англия":{flag:"🏴"},"Великобритания":{flag:"🇬🇧"},"Ирландия":{flag:"🇮🇪"},
  "Шотландия":{flag:"🏴"},"США":{flag:"🇺🇸"},"Италия":{flag:"🇮🇹"},"Испания":{flag:"🇪🇸"},
  "Португалия":{flag:"🇵🇹"},"Персия":{flag:"🇮🇷"},"Иран":{flag:"🇮🇷"},"Япония":{flag:"🇯🇵"},
  "Китай":{flag:"🇨🇳"},"Индия":{flag:"🇮🇳"},"Польша":{flag:"🇵🇱"},"Швеция":{flag:"🇸🇪"},
  "Норвегия":{flag:"🇳🇴"},"Дания":{flag:"🇩🇰"},"Греция":{flag:"🇬🇷"},"Турция":{flag:"🇹🇷"},
  "Чили":{flag:"🇨🇱"},"Аргентина":{flag:"🇦🇷"},"Мексика":{flag:"🇲🇽"},"Ливан":{flag:"🇱🇧"},
  "Венгрия":{flag:"🇭🇺"},"Грузия":{flag:"🇬🇪"},"Армения":{flag:"🇦🇲"},"Шотландия ":{flag:"🏴"}
};
const flagOf = c => (COUNTRY_META[c] && COUNTRY_META[c].flag) || "📜";

const MOODS = [
  ["утро","☀️ утро и рассвет"],
  ["ночь","🌙 ночь и сон"],["нежность","🤍 нежность"],["природа","🍃 природа"],
  ["покой","🕯️ тишина и покой"],["мечта","✨ мечта"],["светлая-грусть","🌒 светлая грусть"],
  ["любование","🌸 любование"],["лёгкое","🙂 лёгкое"],["флирт","😏 флирт"],["чувственное","🌹 чувственное"]
];
const MOOD_LABEL = Object.fromEntries(MOODS.map(m=>[m[0],m[1]]));

const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem("bp:"+k);return v==null?d:JSON.parse(v)}catch(e){return d}},
  set:(k,v)=>{try{localStorage.setItem("bp:"+k,JSON.stringify(v))}catch(e){}}
};

const state = {
  tab:"index",
  query:"",
  mood:null,
  fav:new Set(LS.get("fav",[])),
  fs:LS.get("fs",1.12),
  reader:{list:[],i:0}
};

const $ = s => document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e};
const esc = s => (s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const slug = s => s;

function countries(){
  const seen=[];
  BEDTIME.forEach(p=>{if(!seen.includes(p.country))seen.push(p.country)});
  return seen;
}
function poemsOf(c){return BEDTIME.filter(p=>p.country===c)}
function readingSecs(p){const w=(p.text||"").trim().split(/\s+/).length;return Math.max(20,Math.round(w/3.2))}
function lenLabel(p){const s=readingSecs(p);return s<60?`~${s} сек`:`~${Math.round(s/60)} мин`}

/* ---------- theme & font ---------- */
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);$("#themeBtn").textContent=t==="dark"?"🌙":"☀️";LS.set("theme",t)}
function applyFs(){document.documentElement.style.setProperty("--fs",state.fs.toFixed(2)+"rem");LS.set("fs",state.fs)}

/* ---------- tabs ---------- */
function buildTabs(){
  const bar=$("#tabbar");bar.innerHTML="";
  const idx=el("button","tab"+(state.tab==="index"?" active":""),"📖 Оглавление");
  idx.dataset.go="index";bar.appendChild(idx);
  if(MORNING.length){
    const mb=el("button","tab morn"+(state.tab==="morning"?" active":""),`☀️ Доброе утро <span class="cnt">${MORNING.length}</span>`);
    mb.dataset.go="morning";bar.appendChild(mb);
  }
  countries().forEach(c=>{
    const n=poemsOf(c).length;
    const b=el("button","tab"+(state.tab===c?" active":""),`${flagOf(c)} ${esc(c)} <span class="cnt">${n}</span>`);
    b.dataset.go=c;bar.appendChild(b);
  });
  bar.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>goTab(b.dataset.go)));
}
function goTab(name){
  state.tab=name;
  buildTabs();
  render();
  window.scrollTo({top:0,behavior:"smooth"});
  const active=$("#tabbar .tab.active");if(active)active.scrollIntoView({block:"nearest",inline:"center"});
}

/* ---------- cards ---------- */
function card(p,listCtx){
  const c=el("div","card");
  const meta=el("div","meta");
  meta.appendChild(el("h3",null,esc(p.title)));
  const fav=el("button","fav"+(state.fav.has(p.id)?" on":""),state.fav.has(p.id)?"♥":"♡");
  fav.title="В избранное";
  fav.addEventListener("click",e=>{e.stopPropagation();toggleFav(p.id);fav.classList.toggle("on");fav.textContent=state.fav.has(p.id)?"♥":"♡"});
  meta.appendChild(fav);
  c.appendChild(meta);

  let who=`${esc(p.author)} <span class="yr">· ${esc(p.authorYears||"")}</span>`;
  if(p.translator) who+=`<br>перевод: ${esc(p.translator)}`;
  c.appendChild(el("div","who",who));

  if(p.moodTags&&p.moodTags.length){
    const tg=el("div","tags");
    p.moodTags.forEach(m=>tg.appendChild(el("span","tag",esc(MOOD_LABEL[m]||m))));
    c.appendChild(tg);
  }
  if(p.brief)c.appendChild(el("div","brief",esc(p.brief)));

  const long=(p.text||"").split("\n").length>15;
  const poem=el("div","poem"+(long?" clamp":""),esc(p.text));
  c.appendChild(poem);

  if(!p.isFullText)c.appendChild(el("div","excerpt-note","Отрывок — полный текст под авторскими правами. Читать целиком по ссылке ниже."));

  const foot=el("div","card-foot");
  const rd=el("a","lnk rd","📖 Читать");rd.href="javascript:void 0";
  rd.addEventListener("click",e=>{e.preventDefault();openReader(listCtx,listCtx.indexOf(p))});
  foot.appendChild(rd);
  if(p.sourceUrl){
    const src=el("a","lnk",(p.isFullText?"🔗 Источник":"🔗 Читать полностью")+` · ${esc(p.sourceName||"источник")}`);
    src.href=p.sourceUrl;src.target="_blank";src.rel="noopener";
    foot.appendChild(src);
  }
  if(long){
    const more=el("button","more","Развернуть ▾");
    more.addEventListener("click",()=>{const cl=poem.classList.toggle("clamp");more.textContent=cl?"Развернуть ▾":"Свернуть ▴"});
    foot.appendChild(more);
  }
  foot.appendChild(el("span","len",lenLabel(p)));
  c.appendChild(foot);
  return c;
}

/* ---------- render ---------- */
function render(){
  const m=$("#main");m.innerHTML="";
  if(state.tab==="index")renderIndex(m);
  else if(state.tab==="morning")renderMorning(m);
  else renderCountry(m,state.tab);
  updateBrand();
}
function updateBrand(){
  $("#brandTitle").textContent = META.title;
  $("#brandSub").textContent = META.subtitle;
  document.title = META.title + " · тёплые стихи";
}
function matches(p){
  if(state.mood && !(p.moodTags||[]).includes(state.mood))return false;
  if(state.query){
    const q=state.query.toLowerCase();
    const hay=(p.title+" "+p.author+" "+(p.text||"")+" "+(p.brief||"")+" "+p.country).toLowerCase();
    if(!hay.includes(q))return false;
  }
  return true;
}
function renderIndex(m){
  const col=el("div");
  col.appendChild(el("p","lead",esc(META.lead)));
  col.appendChild(el("p","sub",esc(META.sub)));

  const tb=el("div","toolbar");
  const search=el("input","search");search.type="search";search.placeholder="Поиск: название, автор, слово из стиха…";search.value=state.query;
  search.addEventListener("input",()=>{state.query=search.value.trim();renderFiltered(res)});
  tb.appendChild(search);
  const pills=el("div","pills");
  MOODS.forEach(([k,lab])=>{
    if(!DATA.some(p=>(p.moodTags||[]).includes(k)))return;
    const b=el("button","pill"+(state.mood===k?" on":""),esc(lab));
    b.addEventListener("click",()=>{state.mood=state.mood===k?null:k;pills.querySelectorAll(".pill").forEach(x=>x.classList.remove("on"));if(state.mood)b.classList.add("on");renderFiltered(res)});
    pills.appendChild(b);
  });
  tb.appendChild(pills);
  col.appendChild(tb);

  const res=el("div");col.appendChild(res);

  // favorites
  const favList=DATA.filter(p=>state.fav.has(p.id));
  if(favList.length){
    col.appendChild(el("div","sec-title","♥ Избранное"));
    const fc=el("div");favList.forEach(p=>fc.appendChild(card(p,favList)));col.appendChild(fc);
  }

  // morning collection nav
  if(MORNING.length){
    col.appendChild(el("div","sec-title","☀️ Чтобы отправить с утра"));
    const g=el("div","country-grid");
    const mchip=el("div","country-chip morn-chip",`<span class="fl">☀️</span><span class="nm">Доброе утро — светлая утренняя подборка</span><span class="cnt">${MORNING.length}</span>`);
    mchip.addEventListener("click",()=>goTab("morning"));
    g.appendChild(mchip);col.appendChild(g);
  }

  // country navigation
  col.appendChild(el("div","sec-title","Перед сном — по странам"));
  const grid=el("div","country-grid");
  countries().forEach(c=>{
    const chip=el("div","country-chip",`<span class="fl">${flagOf(c)}</span><span class="nm">${esc(c)}</span><span class="cnt">${poemsOf(c).length}</span>`);
    chip.addEventListener("click",()=>goTab(c));grid.appendChild(chip);
  });
  col.appendChild(grid);

  col.appendChild(el("div","note",META.note));
  m.appendChild(col);

  function renderFiltered(host){
    host.innerHTML="";
    if(!state.query && !state.mood)return; // show nothing until user searches/filters
    const found=DATA.filter(matches);
    host.appendChild(el("div","sec-title",`Найдено: ${found.length}`));
    if(!found.length){host.appendChild(el("div","empty","Ничего не нашлось — попробуй другое слово или настроение."));return}
    found.forEach(p=>host.appendChild(card(p,found)));
  }
  renderFiltered(res);
}
function renderCountry(m,c){
  const col=el("div","col");
  const list=poemsOf(c);
  const head=el("div","country-head",`<span class="fl">${flagOf(c)}</span><h2>${esc(c)}</h2><span class="cnt">${list.length} ${plural(list.length)}</span>`);
  col.appendChild(head);
  if(!list.length)col.appendChild(el("div","empty","Здесь пока пусто."));
  list.forEach(p=>col.appendChild(card(p,list)));
  m.appendChild(col);
}
function renderMorning(m){
  const col=el("div","col");
  col.appendChild(el("div","country-head",`<span class="fl">☀️</span><h2>${esc(META.morningTitle||"Доброе утро")}</h2><span class="cnt">${MORNING.length} ${plural(MORNING.length)}</span>`));
  if(META.morningLead)col.appendChild(el("p","sub",esc(META.morningLead)));
  if(!MORNING.length)col.appendChild(el("div","empty","Здесь пока пусто."));
  MORNING.forEach(p=>col.appendChild(card(p,MORNING)));
  m.appendChild(col);
}
function plural(n){const a=Math.abs(n)%100,b=a%10;if(a>10&&a<20)return"стихов";if(b>1&&b<5)return"стиха";if(b===1)return"стих";return"стихов"}

/* ---------- favorites ---------- */
function toggleFav(id){if(state.fav.has(id))state.fav.delete(id);else state.fav.add(id);LS.set("fav",[...state.fav])}

/* ---------- reader ---------- */
function openReader(list,i){
  state.reader={list,i};
  paintReader();
  $("#reader").classList.add("on");$("#reader").setAttribute("aria-hidden","false");
  document.body.style.overflow="hidden";
}
function paintReader(){
  const {list,i}=state.reader;const p=list[i];if(!p)return;
  const inner=$("#readerInner");
  let who=`${esc(p.author)} · ${esc(p.authorYears||"")}${p.translator?" · пер. "+esc(p.translator):""}`;
  let src=p.sourceUrl?`<a class="src" href="${esc(p.sourceUrl)}" target="_blank" rel="noopener">🔗 ${esc(p.isFullText?"источник":"полный текст")} · ${esc(p.sourceName||"")}</a>`:"";
  let note=!p.isFullText?`<div class="excerpt-note" style="text-align:center">Отрывок — полный текст по ссылке.</div>`:"";
  inner.innerHTML=`<h3>${esc(p.title)}</h3><div class="who">${flagOf(p.country)} ${who}</div><div class="poem">${esc(p.text)}</div>${note}<div>${src}</div>`;
  $("#readerCrumb").textContent=`${flagOf(p.country)} ${p.country} · ${i+1} из ${list.length}`;
  $("#readerPrev").disabled=i<=0;
  $("#readerNext").disabled=i>=list.length-1;
  LS.set("last",p.id);
}
function readerMove(d){const n=state.reader.i+d;if(n<0||n>=state.reader.list.length)return;state.reader.i=n;paintReader();$("#readerInner").scrollTo?.(0,0)}
function closeReader(){$("#reader").classList.remove("on");$("#reader").setAttribute("aria-hidden","true");document.body.style.overflow=""}

/* ---------- random ---------- */
function randomPoem(){
  if(!DATA.length)return;
  const p=DATA[Math.floor(Math.random()*DATA.length)];
  const list=p.section==="morning"?MORNING:poemsOf(p.country);
  openReader(list,list.indexOf(p));
}

/* ---------- wire ---------- */
function init(){
  const savedTheme=LS.get("theme","dark");applyTheme(savedTheme);
  applyFs();
  buildTabs();render();

  $("#themeBtn").addEventListener("click",()=>applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark"));
  $("#fsPlus").addEventListener("click",()=>{state.fs=Math.min(1.6,state.fs+0.06);applyFs()});
  $("#fsMinus").addEventListener("click",()=>{state.fs=Math.max(0.92,state.fs-0.06);applyFs()});
  $("#randomBtn").addEventListener("click",randomPoem);

  $("#readerClose").addEventListener("click",closeReader);
  $("#readerPrev").addEventListener("click",()=>readerMove(-1));
  $("#readerNext").addEventListener("click",()=>readerMove(1));
  $("#reader").addEventListener("click",e=>{if(e.target.id==="reader"||e.target.classList.contains("reader-body"))closeReader()});
  document.addEventListener("keydown",e=>{
    if(!$("#reader").classList.contains("on"))return;
    if(e.key==="Escape")closeReader();
    if(e.key==="ArrowLeft")readerMove(-1);
    if(e.key==="ArrowRight")readerMove(1);
  });

  const tt=$("#toTop");
  window.addEventListener("scroll",()=>{tt.classList.toggle("on",window.scrollY>500)});
  tt.addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));
}
const META = {"title": "Перед сном", "subtitle": "тёплые стихи, чтобы читать на ночь", "lead": "Тихие стихи со всего света — не сухие признания, а красота: ночь, звёзды, тишина, нежность, лёгкий флирт. Чтобы перечитать один перед сном и уснуть с тёплой улыбкой.", "sub": "Открой вкладку страны или нажми «Случайный». Любой стих можно раскрыть в спокойном режиме чтения кнопкой «Читать».", "note": "<b>Честно о подборке.</b> «Топ мировой поэзии» здесь — кураторский выбор под настроение «перед сном», а не объективный рейтинг: такого рейтинга не существует. Тексты не сочинены — каждый сверен с реальной страницей источника (ссылка на карточке). Где произведение и перевод в общественном достоянии — даётся полный текст; где ещё действуют авторские права — короткий отрывок и ссылка. Страна у переводного стиха — родина автора оригинала; переводчик указан отдельно. Буква «ё» местами восстановлена для чтения.<br><br><b>Две подборки.</b> Вечерняя — по странам (перечитать один перед сном). Утренняя — отдельной вкладкой «☀️ Доброе утро»: светлые стихи о рассвете, солнце и пробуждении, чтобы отправить кому-то с добрым утром. Утренняя часть почти вся русская классика XIX — начала XX века: именно она в общественном достоянии даёт больше всего полных «утренних» текстов.<br><br><b>Подборка растёт.</b> Наполняю её проверенными текстами; Россия пока идёт первой — её поэзия XIX — начала XX века в общественном достоянии даёт больше всего полных текстов. Остальные страны — через public-domain переводы (Фет, Бальмонт, Брюсов, Сологуб, Дельвиг, Мин, Кузмин, Нович и др.); где полного текста нет — отрывок и ссылка. Персидский раздел — фетовский цикл «Из Гафиза»: не буквальный Хафиз, а его знаменитые вольные подражания (о чём честно сказано в каждой карточке). Всего — десять стран: Россия, Германия, Франция, Англия, Италия, Персия, Китай, Япония, США, Испания. Латинскую Америку добавить честно не вышло — её переводы (Дарио, Нерво, Мистраль) почти все под копирайтом, а мрачное ради счёта я не беру.", "morningTitle": "Доброе утро", "morningLead": "Светлые стихи о рассвете, солнце и пробуждении — чтобы отправить кому-то с добрым утром. Тот же тон, что и вечерняя часть: нежность, любование, лёгкость, без мрака и надрыва. Тексты сверены с источником; почти все — русская классика в общественном достоянии."};
init();
</script>
