<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Перед сном · тёплые стихи</title>
<style>
  :root{
    --bg:#0e0f1f; --bg2:#14152b; --panel:#191a30; --panel2:#1f2038;
    --edge:#2c2d49; --text:#ece6da; --soft:#c9c3d6; --muted:#948ea6;
    --gold:#e9b872; --rose:#dd9aa0; --accent:var(--gold);
    --shadow:0 10px 30px rgba(0,0,0,.35);
    --serif:Georgia,"Times New Roman",'PT Serif',serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --fs:1.12rem; --radius:16px;
  }
  :root[data-theme="light"]{
    --bg:#f4ecdd; --bg2:#efe6d4; --panel:#fffdf8; --panel2:#faf4e8;
    --edge:#e5dcc7; --text:#2c2822; --soft:#4c463b; --muted:#7c7361;
    --gold:#b07d2a; --rose:#b25c63; --accent:var(--gold);
    --shadow:0 8px 24px rgba(120,100,60,.15);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:radial-gradient(1200px 900px at 70% -10%, var(--bg2), var(--bg)) no-repeat;
    background-attachment:scroll;
    color:var(--text); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; line-height:1.55;
    padding-bottom:60px;
  }
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1000px;margin:0 auto;padding:0 18px}

  header.top{
    position:sticky;top:0;z-index:30;
    background:color-mix(in srgb, var(--bg) 94%, transparent);
    border-bottom:1px solid var(--edge);
  }
  .top-in{max-width:1000px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;gap:2px;margin-right:auto;min-width:0}
  .brand h1{font-family:var(--serif);font-weight:600;font-size:1.32rem;margin:0;letter-spacing:.2px}
  .brand p{margin:0;color:var(--muted);font-size:.82rem}
  .ctrls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .btn{
    appearance:none;cursor:pointer;border:1px solid var(--edge);
    background:var(--panel);color:var(--soft);border-radius:999px;
    padding:8px 12px;font-size:.85rem;font-family:var(--sans);
    display:inline-flex;align-items:center;gap:6px;transition:.15s;
  }
  .btn:hover{border-color:var(--accent);color:var(--text)}
  .btn.icon{padding:8px 10px}
  .fs-group{display:inline-flex;border:1px solid var(--edge);border-radius:999px;overflow:hidden;background:var(--panel)}
  .fs-group button{appearance:none;border:0;background:transparent;color:var(--soft);cursor:pointer;padding:8px 11px;font-size:.85rem}
  .fs-group button:hover{color:var(--text)}
  .btn.cta{border-color:color-mix(in srgb,var(--accent) 55%,var(--edge));color:var(--text)}
  .btn.cta:hover{background:color-mix(in srgb,var(--accent) 16%,var(--panel))}

  nav.tabs{position:sticky;top:59px;z-index:20;background:color-mix(in srgb,var(--bg) 94%,transparent);border-bottom:1px solid var(--edge)}
  .tabs-in{max-width:1000px;margin:0 auto;padding:9px 12px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:thin}
  .tabs-in::-webkit-scrollbar{height:6px}
  .tabs-in::-webkit-scrollbar-thumb{background:var(--edge);border-radius:3px}
  .tab{
    flex:0 0 auto;cursor:pointer;border:1px solid var(--edge);background:var(--panel);
    color:var(--soft);border-radius:999px;padding:7px 13px;font-size:.86rem;white-space:nowrap;transition:.15s;
  }
  .tab:hover{color:var(--text);border-color:color-mix(in srgb,var(--accent) 45%,var(--edge))}
  .tab.active{background:color-mix(in srgb,var(--accent) 18%,var(--panel));border-color:var(--accent);color:var(--text)}
  .tab .cnt{color:var(--muted);font-size:.78em;margin-left:5px}
  .tab.active .cnt{color:var(--soft)}

  main{padding-top:22px}
  section[data-tab]{display:none;animation:fade .35s ease}
  section[data-tab].active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .lead{font-family:var(--serif);font-size:1.2rem;line-height:1.6;color:var(--soft);max-width:680px;margin:6px 0 4px}
  .sub{color:var(--muted);max-width:680px;margin:0 0 20px;font-size:.95rem}

  .toolbar{display:flex;flex-direction:column;gap:12px;margin:0 0 20px;max-width:680px}
  .search{
    width:100%;border:1px solid var(--edge);background:var(--panel);color:var(--text);
    border-radius:12px;padding:12px 14px;font-size:1rem;font-family:var(--sans);
  }
  .search:focus{outline:none;border-color:var(--accent)}
  .pills{display:flex;gap:7px;flex-wrap:wrap}
  .pill{cursor:pointer;border:1px solid var(--edge);background:var(--panel);color:var(--soft);border-radius:999px;padding:6px 12px;font-size:.82rem;transition:.15s}
  .pill:hover{color:var(--text)}
  .pill.on{background:color-mix(in srgb,var(--rose) 22%,var(--panel));border-color:var(--rose);color:var(--text)}

  .sec-title{font-family:var(--serif);font-size:1.05rem;color:var(--muted);font-weight:600;margin:26px 0 12px;letter-spacing:.3px;text-transform:none}
  .country-grid{display:flex;flex-wrap:wrap;gap:9px;max-width:760px}
  .country-chip{cursor:pointer;border:1px solid var(--edge);background:var(--panel);border-radius:12px;padding:10px 13px;display:flex;align-items:center;gap:9px;transition:.15s}
  .country-chip:hover{border-color:var(--accent);transform:translateY(-1px)}
  .country-chip .fl{font-size:1.15rem}
  .country-chip .nm{font-size:.9rem;color:var(--text)}
  .country-chip .cnt{font-size:.78rem;color:var(--muted)}

  .col{max-width:680px;margin:0 auto}
  .country-head{display:flex;align-items:baseline;gap:11px;margin:2px 0 16px}
  .country-head .fl{font-size:1.6rem}
  .country-head h2{font-family:var(--serif);font-weight:600;margin:0;font-size:1.5rem}
  .country-head .cnt{color:var(--muted);font-size:.9rem}

  .card{
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--edge);border-radius:var(--radius);
    padding:20px 22px;margin:0 0 18px;box-shadow:var(--shadow);position:relative;
  }
  .card .meta{display:flex;align-items:flex-start;gap:10px;margin-bottom:4px}
  .card h3{font-family:var(--serif);font-weight:600;font-size:1.18rem;margin:0;line-height:1.3;flex:1}
  .card .who{color:var(--muted);font-size:.86rem;margin:2px 0 0}
  .card .who .yr{opacity:.8}
  .fav{appearance:none;border:0;background:transparent;cursor:pointer;font-size:1.15rem;line-height:1;color:var(--muted);padding:2px 2px;transition:.15s;flex:0 0 auto}
  .fav:hover{transform:scale(1.15)}
  .fav.on{color:var(--rose)}

  .tags{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 12px}
  .tag{font-size:.72rem;color:var(--soft);background:color-mix(in srgb,var(--accent) 12%,transparent);border:1px solid var(--edge);border-radius:999px;padding:3px 9px}
  .brief{color:var(--soft);font-size:.92rem;line-height:1.6;margin:0 0 14px;padding-left:12px;border-left:2px solid color-mix(in srgb,var(--accent) 50%,var(--edge))}

  .poem{font-family:var(--serif);font-size:var(--fs);line-height:1.78;white-space:pre-wrap;color:var(--text);margin:0}
  .poem.clamp{max-height:16.5em;overflow:hidden;position:relative}
  .poem.clamp::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2.8em;background:linear-gradient(transparent,var(--panel2))}
  .excerpt-note{font-size:.78rem;color:var(--muted);margin:10px 0 0;font-style:italic}
  .card-foot{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--edge)}
  .card-foot .lnk{font-size:.82rem;display:inline-flex;align-items:center;gap:5px}
  .card-foot .rd{cursor:pointer}
  .card-foot .more{cursor:pointer;color:var(--soft);font-size:.82rem;background:none;border:0;padding:0}
  .card-foot .more:hover{color:var(--accent)}
  .card-foot .len{color:var(--muted);font-size:.78rem;margin-left:auto}

  .empty{color:var(--muted);font-style:italic;padding:30px 0;text-align:center}
  .note{max-width:680px;margin:30px auto 0;background:var(--panel);border:1px solid var(--edge);border-radius:14px;padding:16px 18px;color:var(--muted);font-size:.84rem;line-height:1.65}
  .note b{color:var(--soft)}

  /* reader overlay */
  .reader{position:fixed;inset:0;z-index:60;display:none;background:color-mix(in srgb,var(--bg) 97%,#000)}
  .reader.on{display:flex;flex-direction:column}
  .reader.on .reader-inner{animation:fade .4s ease}
  .reader-bar{display:flex;align-items:center;gap:10px;padding:14px 18px;color:var(--muted);font-size:.85rem}
  .reader-bar .x{margin-left:auto;cursor:pointer;font-size:1.5rem;line-height:1;color:var(--soft);background:none;border:0}
  .reader-body{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:10px 22px 30px}
  .reader-inner{max-width:640px;width:100%;text-align:center}
  .reader-inner h3{font-family:var(--serif);font-weight:600;font-size:1.5rem;margin:0 0 6px}
  .reader-inner .who{color:var(--muted);font-size:.9rem;margin-bottom:26px}
  .reader-inner .poem{font-size:calc(var(--fs) + .28rem);line-height:1.95;text-align:center;white-space:pre-wrap}
  .reader-inner .src{margin-top:26px;font-size:.8rem}
  .reader-nav{position:absolute;top:50%;transform:translateY(-50%);border:1px solid var(--edge);background:var(--panel);color:var(--soft);width:46px;height:46px;border-radius:50%;cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center}
  .reader-nav:hover{border-color:var(--accent);color:var(--text)}
  .reader-nav.prev{left:14px}
  .reader-nav.next{right:14px}
  .reader-nav[disabled]{opacity:.25;cursor:default}

  .totop{position:fixed;right:16px;bottom:16px;z-index:25;width:44px;height:44px;border-radius:50%;border:1px solid var(--edge);background:var(--panel);color:var(--soft);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:var(--shadow)}
  .totop.on{display:flex}

  @media(max-width:560px){
    .brand h1{font-size:1.15rem}
    .card{padding:17px 16px}
    .reader-nav{width:40px;height:40px}
    .reader-nav.prev{left:6px}.reader-nav.next{right:6px}
  }
</style>
</head>
<body>
<header class="top">
  <div class="top-in">
    <div class="brand">
      <h1 id="brandTitle">Перед сном</h1>
      <p id="brandSub">Тёплые стихи, чтобы читать на ночь</p>
    </div>
    <div class="ctrls">
      <button class="btn cta" id="randomBtn" title="Случайный стих">🎲 <span>Случайный</span></button>
      <div class="fs-group" title="Размер шрифта">
        <button id="fsMinus" aria-label="Меньше шрифт">A−</button>
        <button id="fsPlus" aria-label="Больше шрифт">A+</button>
      </div>
      <button class="btn icon" id="themeBtn" title="Тема">🌙</button>
    </div>
  </div>
</header>

<nav class="tabs"><div class="tabs-in" id="tabbar"></div></nav>

<main class="wrap" id="main"></main>

<div class="reader" id="reader" aria-hidden="true">
  <div class="reader-bar">
    <span id="readerCrumb"></span>
    <button class="x" id="readerClose" aria-label="Закрыть">×</button>
  </div>
  <div class="reader-body">
    <button class="reader-nav prev" id="readerPrev" aria-label="Предыдущий">‹</button>
    <div class="reader-inner" id="readerInner"></div>
    <button class="reader-nav next" id="readerNext" aria-label="Следующий">›</button>
  </div>
</div>

<button class="totop" id="toTop" aria-label="Наверх">↑</button>

<script>
const DATA = [{"id": "ru-pushkin-na-holmah-gruzii", "title": "На холмах Грузии лежит ночная мгла", "author": "Александр Пушкин", "authorYears": "1799–1837", "country": "Россия", "year": "1829", "text": "На холмах Грузии лежит ночная мгла;\nШумит Арагва предо мною.\nМне грустно и легко; печаль моя светла;\nПечаль моя полна тобою,\nТобой, одной тобой… Унынья моего\nНичто не мучит, не тревожит,\nИ сердце вновь горит и любит — оттого,\nЧто не любить оно не может.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/На_холмах_Грузии_лежит_ночная_мгла_(Пушкин)", "sourceName": "Русская Викитека", "moodTags": ["светлая-грусть", "ночь", "нежность"], "brief": "Одно из самых прозрачных стихотворений русской лирики: ночь легла на грузинские холмы, внизу шумит Арагва — и рождается формула чистой светлой печали: «мне грустно и легко; печаль моя светла». Это не признание и не жалоба, а тихое свечение сердца, которое любит без надрыва и требований — просто потому, что «не любить оно не может». Идеально, чтобы отпустить день и уснуть в мире с собой."}, {"id": "ru-pushkin-esli-zhizn", "title": "Если жизнь тебя обманет", "author": "Александр Пушкин", "authorYears": "1799–1837", "country": "Россия", "year": "1825", "text": "Если жизнь тебя обманет,\nНе печалься, не сердись!\nВ день уныния смирись:\nДень веселья, верь, настанет.\n\nСердце в будущем живёт;\nНастоящее уныло:\nВсё мгновенно, всё пройдёт;\nЧто пройдёт, то будет мило.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Если_жизнь_тебя_обманет_(Пушкин)", "sourceName": "Русская Викитека", "moodTags": ["покой", "лёгкое"], "brief": "Пушкин вписал эти восемь строк в альбом пятнадцатилетней Евпраксии Вульф — и вышло самое доброе утешение русской поэзии. «В день уныния смирись: день веселья, верь, настанет». Мягкое обещание, что всё мгновенно и всё пройдёт, а «что пройдёт, то будет мило», — ровно то, что хочется прошептать себе, когда день не задался, и заснуть с надеждой."}, {"id": "ru-pushkin-zimnee-utro", "title": "Зимнее утро", "author": "Александр Пушкин", "authorYears": "1799–1837", "country": "Россия", "year": "1829", "text": "Мороз и солнце; день чудесный!\nЕщё ты дремлешь, друг прелестный —\nПора, красавица, проснись:\nОткрой сомкнуты негой взоры\nНавстречу северной Авроры,\nЗвездою севера явись!\n\nВечор, ты помнишь, вьюга злилась,\nНа мутном небе мгла носилась;\nЛуна, как бледное пятно,\nСквозь тучи мрачные желтела,\nИ ты печальная сидела —\nА нынче… погляди в окно:\n\nПод голубыми небесами\nВеликолепными коврами,\nБлестя на солнце, снег лежит;\nПрозрачный лес один чернеет,\nИ ель сквозь иней зеленеет,\nИ речка подо льдом блестит.\n\nВся комната янтарным блеском\nОзарена. Весёлым треском\nТрещит затопленная печь.\nПриятно думать у лежанки.\nНо знаешь: не велеть ли в санки\nКобылку бурую запречь?\n\nСкользя по утреннему снегу,\nДруг милый, предадимся бегу\nНетерпеливого коня\nИ навестим поля пустые,\nЛеса, недавно столь густые,\nИ берег, милый для меня.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Зимнее_утро_(Пушкин)", "sourceName": "Русская Викитека", "moodTags": ["любование", "лёгкое", "покой"], "brief": "«Мороз и солнце; день чудесный!» — самая солнечная и согревающая картина русской зимы. Пушкин будит любимую нежным «пора, красавица, проснись» и ведёт её взглядом от вчерашней вьюги к искристому снегу, янтарному блеску комнаты и весёлому треску печки. Читаешь — и будто сам оказываешься в тёплом доме, где за окном сияет мороз; на душе просто теплеет."}, {"id": "ru-pushkin-noch", "title": "Ночь", "author": "Александр Пушкин", "authorYears": "1799–1837", "country": "Россия", "year": "1823", "text": "Мой голос для тебя и ласковый и томный\nТревожит поздное молчанье ночи тёмной.\nБлиз ложа моего печальная свеча\nГорит; мои стихи, сливаясь и журча,\nТекут, ручьи любви, текут, полны тобою.\nВо тьме твои глаза блистают предо мною,\nМне улыбаются, и звуки слышу я:\nМой друг, мой нежный друг… люблю… твоя… твоя!..", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Ночь_(Пушкин)", "sourceName": "Русская Викитека", "moodTags": ["чувственное", "ночь", "нежность"], "brief": "Голос «ласковый и томный», печальная свеча у ложа, стихи, что «текут, ручьи любви», — восемь строк, в которых Пушкин почти шёпотом говорит с ночью и с любимой. Чувственное, но целомудренно-прекрасное: в темноте «блистают» её глаза, и слышится «люблю… твоя… твоя!». Тихий любовный жар без единого грубого слова — чтобы уснуть с этим теплом на губах."}, {"id": "ru-fet-chudnaya-kartina", "title": "Чудная картина", "author": "Афанасий Фет", "authorYears": "1820–1892", "country": "Россия", "year": "1842", "text": "Чудная картина,\nКак ты мне родна:\nБелая равнина,\nПолная луна,\n\nСвет небес высоких,\nИ блестящий снег,\nИ саней далёких\nОдинокий бег.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Чудная_картина_(Фет)", "sourceName": "Русская Викитека", "moodTags": ["ночь", "покой", "природа"], "brief": "Восемь строк — и перед глазами разворачивается вся зимняя ночь: белая равнина, полная луна, блестящий снег и одинокий бег далёких саней. Фет почти не называет чувств — только показывает, и от этой простоты щемит: «как ты мне родна». Чистое, просторное любование, тихое, как сама эта ночь."}, {"id": "ru-fet-na-zare-ne-budi", "title": "На заре ты её не буди", "author": "Афанасий Фет", "authorYears": "1820–1892", "country": "Россия", "year": "1842", "text": "На заре ты её не буди,\nНа заре она сладко так спит;\nУтро дышит у ней на груди,\nЯрко пышет на ямках ланит.\n\nИ подушка её горяча,\nИ горяч утомительный сон,\nИ, чернеясь, бегут на плеча\nКосы лентой с обеих сторон.\n\nА вчера у окна ввечеру\nДолго-долго сидела она\nИ следила по тучам игру,\nЧто, скользя, затевала луна.\n\nИ чем ярче играла луна,\nИ чем громче свистал соловей,\nВсё бледней становилась она,\nСердце билось больней и больней.\n\nОттого-то на юной груди,\nНа ланитах так утро горит.\nНе буди ж ты её, не буди…\nНа заре она сладко так спит!", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/На_заре_ты_её_не_буди_(Фет)", "sourceName": "Русская Викитека", "moodTags": ["нежность", "ночь"], "brief": "Знаменитый романс на музыку Варламова, весь построенный на одном бережном жесте: не буди её, пусть спит. Она уснула лишь на заре, всю ночь следив за игрою луны, — и теперь «утро дышит у ней на груди». Нежность, доведённая до шёпота: любоваться спящей и охранять её сон."}, {"id": "ru-fet-kot-poyot", "title": "Кот поёт, глаза прищуря", "author": "Афанасий Фет", "authorYears": "1820–1892", "country": "Россия", "year": "1842", "text": "Кот поёт, глаза прищуря,\nМальчик дремлет на ковре,\nНа дворе играет буря,\nВетер свищет на дворе.\n\n«Полно тут тебе валяться,\nСпрячь игрушки да вставай!\nПодойди ко мне прощаться,\nДа и спать себе ступай».\n\nМальчик встал. А кот глазами\nПоводил и всё поёт;\nВ окна снег валит клоками,\nБуря свищет у ворот.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Кот_поёт,_глаза_прищуря_(Фет)", "sourceName": "Русская Викитека", "moodTags": ["покой", "нежность", "лёгкое"], "brief": "Три строфы домашнего тепла: кот мурлычет, мальчик дремлет на ковре, за окном воет метель — а внутри так уютно, что клонит в сон. «Подойди ко мне прощаться, да и спать себе ступай». Крошечная колыбельная о самом счастливом на свете чувстве — когда за окном буря, а дома покой."}, {"id": "ru-fet-shepot", "title": "Шёпот, робкое дыханье", "author": "Афанасий Фет", "authorYears": "1820–1892", "country": "Россия", "year": "1850", "text": "Шёпот, робкое дыханье,\nТрели соловья,\nСеребро и колыханье\nСонного ручья,\n\nСвет ночной, ночные тени,\nТени без конца,\nРяд волшебных изменений\nМилого лица,\n\nВ дымных тучках пурпур розы,\nОтблеск янтаря,\nИ лобзания, и слёзы,\nИ заря, заря!..", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Шёпот,_робкое_дыханье_(Фет)", "sourceName": "Русская Викитека", "moodTags": ["чувственное", "ночь", "нежность"], "brief": "Двенадцать строк — и ни одного глагола: только шёпот, трели соловья, серебро сонного ручья и «ряд волшебных изменений милого лица». Фет пишет ночное свидание одними образами, и от этого оно становится ещё чувственнее — «и лобзания, и слёзы, и заря, заря!..». Тёплая, будоражащая нежность, растворённая в самой ночи."}, {"id": "ru-fet-ya-prishel", "title": "Я пришёл к тебе с приветом", "author": "Афанасий Фет", "authorYears": "1820–1892", "country": "Россия", "year": "1843", "text": "Я пришёл к тебе с приветом,\nРассказать, что солнце встало,\nЧто оно горячим светом\nПо листам затрепетало;\n\nРассказать, что лес проснулся,\nВесь проснулся, веткой каждой,\nКаждой птицей встрепенулся\nИ весенней полон жаждой;\n\nРассказать, что с той же страстью,\nКак вчера, пришёл я снова,\nЧто душа всё так же счастью\nИ тебе служить готова;\n\nРассказать, что отовсюду\nНа меня весельем веет,\nЧто не знаю сам, что буду\nПеть — но только песня зреет.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Я_пришёл_к_тебе_с_приветом_(Фет)", "sourceName": "Русская Викитека", "moodTags": ["любование", "нежность", "лёгкое"], "brief": "Юный, ликующий гимн утру и влюблённости: поэт вбегает рассказать, что «солнце встало», что лес проснулся «весенней жаждой» — и что он пришёл «с той же страстью», что и вчера. Всё дышит светом, весельем и нерастраченной нежностью; песня, которая ещё только «зреет», а уже согревает. Стих, от которого хочется улыбнуться и поверить, что завтра будет хорошо."}, {"id": "ru-esenin-beryoza", "title": "Берёза", "author": "Сергей Есенин", "authorYears": "1895–1925", "country": "Россия", "year": "1913", "text": "Белая берёза\nПод моим окном\nПринакрылась снегом,\nТочно серебром.\n\nНа пушистых ветках\nСнежною каймой\nРаспустились кисти\nБелой бахромой.\n\nИ стоит берёза\nВ сонной тишине,\nИ горят снежинки\nВ золотом огне.\n\nА заря, лениво\nОбходя кругом,\nОбсыпает ветки\nНовым серебром.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Берёза_(Есенин)", "sourceName": "Русская Викитека", "moodTags": ["природа", "покой", "ночь"], "brief": "Самая тихая берёза русской поэзии: под снегом, «в сонной тишине», в серебре и золотом огне зари. Есенину было семнадцать — и вышла безмятежная снежная колыбельная, где всё замерло и светится. Ничего не происходит, и в этом вся её убаюкивающая прелесть."}, {"id": "ru-esenin-porosha", "title": "Пороша", "author": "Сергей Есенин", "authorYears": "1895–1925", "country": "Россия", "year": "1914", "text": "Еду. Тихо. Слышны звоны\nПод копытом на снегу.\nТолько серые вороны\nРасшумелись на лугу.\n\nЗаколдован невидимкой,\nДремлет лес под сказку сна.\nСловно белою косынкой\nПовязалася сосна.\n\nПонагнулась, как старушка,\nОперлася на клюку,\nА под самою макушкой\nДолбит дятел на суку.\n\nСкачет конь, простору много.\nВалит снег и стелет шаль.\nБесконечная дорога\nУбегает лентой вдаль.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Пороша_(Есенин)", "sourceName": "Русская Викитека", "moodTags": ["природа", "покой", "мечта"], "brief": "Тихая зимняя дорога, где «дремлет лес под сказку сна», сосна кутается в белую косынку, как старушка, а снег «стелет шаль». Есенин превращает обычный снегопад в дремотную сказку, и бесконечная дорога сама «убегает лентой вдаль». Заворожённая, укачивающая прогулка, после которой легко закрыть глаза."}, {"id": "ru-esenin-nivy-szhaty", "title": "Нивы сжаты, рощи голы", "author": "Сергей Есенин", "authorYears": "1895–1925", "country": "Россия", "year": "1917", "text": "Нивы сжаты, рощи голы,\nОт воды туман и сырость.\nКолесом за сини горы\nСолнце тихое скатилось.\n\nДремлет взрытая дорога.\nЕй сегодня примечталось,\nЧто совсем, совсем немного\nЖдать зимы седой осталось.\n\nАх, и сам я в чаще звонкой\nУвидал вчера в тумане:\nРыжий месяц жеребёнком\nЗапрягался в наши сани.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Нивы_сжаты,_рощи_голы_(Есенин)", "sourceName": "Русская Викитека", "moodTags": ["природа", "мечта", "светлая-грусть"], "brief": "Осенние сумерки: тихое солнце «колесом за сини горы» скатилось, дремлющая дорога грезит о близкой зиме. А в конце — есенинское чудо: «рыжий месяц жеребёнком запрягался в наши сани». Светлая, полусонная грусть, в которой явь незаметно переходит в сон."}, {"id": "ru-polonsky-pesnya-cyganki", "title": "Песня цыганки", "author": "Яков Полонский", "authorYears": "1819–1898", "country": "Россия", "year": "1853", "text": "Мой костёр в тумане светит;\nИскры гаснут на лету…\nНочью нас никто не встретит;\nМы простимся на мосту.\n\nНочь пройдёт — и спозаранок\nВ степь, далёко, милый мой,\nЯ уйду с толпой цыганок\nЗа кибиткой кочевой.\n\nНа прощанье шаль с каймою\nТы на мне узлом стяни:\nКак концы её, с тобою\nМы сходились в эти дни.\n\nКто-то мне судьбу предскажет?\nКто-то завтра, сокол мой,\nНа груди моей развяжет\nУзел, стянутый тобой?\n\nВспоминай, коли другая,\nДруга милого любя,\nБудет песни петь, играя\nНа коленях у тебя!\n\nМой костёр в тумане светит;\nИскры гаснут на лету…\nНочью нас никто не встретит;\nМы простимся на мосту.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Песня_цыганки_(Полонский)", "sourceName": "Русская Викитека", "moodTags": ["светлая-грусть", "ночь", "нежность"], "brief": "«Мой костёр в тумане светит…» — тот самый старинный романс о ночном прощании на мосту. Расставание здесь не горе, а тёплая, кочевая грусть: шаль с каймою, искры на лету, «сокол мой», память об этих днях. Нежная, чуть цыганская печаль, которая согревает, а не ранит."}, {"id": "ru-tolstoy-sred-shumnogo-bala", "title": "Средь шумного бала, случайно", "author": "Алексей К. Толстой", "authorYears": "1817–1875", "country": "Россия", "year": "1851", "text": "Средь шумного бала, случайно,\nВ тревоге мирской суеты,\nТебя я увидел, но тайна\nТвои покрывала черты.\n\nЛишь очи печально глядели,\nА голос так дивно звучал,\nКак звон отдалённой свирели,\nКак моря играющий вал.\n\nМне стан твой понравился тонкий\nИ весь твой задумчивый вид,\nА смех твой, и грустный и звонкий,\nС тех пор в моём сердце звучит.\n\nВ часы одинокие ночи\nЛюблю я, усталый, прилечь —\nЯ вижу печальные очи,\nЯ слышу весёлую речь;\n\nИ грустно я так засыпаю,\nИ в грёзах неведомых сплю…\nЛюблю ли тебя — я не знаю,\nНо кажется мне, что люблю!", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Средь_шумного_бала,_случайно_(А._К._Толстой)", "sourceName": "Русская Викитека", "moodTags": ["флирт", "ночь", "нежность", "мечта"], "brief": "Он увидел её среди шумного бала — полускрытую тайной, с печальными очами и голосом, как «звон отдалённой свирели», — и с тех пор её грустно-звонкий смех звучит в его сердце. А ночью, засыпая, он всё вспоминает её и признаётся сам себе с обворожительной неуверенностью: «Люблю ли тебя — я не знаю, но кажется мне, что люблю!». Мерцающий флирт и дремота разом — идеальный стих, чтобы уснуть, думая о ком-то."}, {"id": "ru-tolstoy-to-bylo-vesnoy", "title": "То было раннею весной", "author": "Алексей К. Толстой", "authorYears": "1817–1875", "country": "Россия", "year": "1871", "text": "То было раннею весной,\nТрава едва всходила,\nРучьи текли, не парил зной,\nИ зелень рощ сквозила;\n\nТруба пастушья поутру\nЕщё не пела звонко,\nИ в завитках ещё в бору\nБыл папоротник тонкий.\n\nТо было раннею весной,\nВ тени берёз то было,\nКогда с улыбкой предо мной\nТы очи опустила.\n\nТо на любовь мою в ответ\nТы опустила вежды —\nО жизнь! о лес! о солнца свет!\nО юность! о надежды!\n\nИ плакал я перед тобой,\nНа лик твой глядя милый, —\nТо было раннею весной,\nВ тени берёз то было!\n\nТо было в утро наших лет —\nО счастие! о слёзы!\nО лес! о жизнь! о солнца свет!\nО свежий дух берёзы!", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/То_было_раннею_весной_(А._К._Толстой)", "sourceName": "Русская Викитека", "moodTags": ["светлая-грусть", "нежность", "любование"], "brief": "Воспоминание о первой любви, залитое светом ранней весны: едва всходит трава, сквозит зелень рощ — и она, с улыбкой опустив глаза, отвечает на его чувство. Толстой захлёбывается счастьем в сплошных восклицаниях: «О жизнь! о лес! о солнца свет! О юность! о надежды!». Светлая, до слёз нежная грусть о том безвозвратно прекрасном «утре наших лет»."}, {"id": "de-goethe-gornye-vershiny", "title": "Горные вершины (Из Гёте)", "author": "Иоганн Вольфганг фон Гёте", "authorYears": "1749–1832", "translator": "Михаил Лермонтов (1814–1841)", "country": "Германия", "year": "1780 / пер. 1840", "text": "Горные вершины\nСпят во тьме ночной;\nТихие долины\nПолны свежей мглой;\nНе пылит дорога,\nНе дрожат листы…\nПодожди немного,\nОтдохнёшь и ты.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Из_Гете_(Лермонтов)", "sourceName": "Русская Викитека", "moodTags": ["ночь", "покой", "природа"], "brief": "Вольный перевод Лермонтова из Гёте — восемь строк, в которых засыпает весь мир: горные вершины, тихие долины в свежей мгле, замершая дорога, неподвижные листья. И тихое, почти колыбельное обещание в финале: «подожди немного, отдохнёшь и ты». Разлитая по строкам тишина, сама просящаяся в изголовье."}, {"id": "de-heine-lileeju-rozoj", "title": "«Лилеею, розой, голубкой, денницей»", "author": "Генрих Гейне", "authorYears": "1797–1856", "translator": "Афанасий Фет (1820–1892)", "country": "Германия", "year": "1823 / пер. 1857", "text": "Лилеею, розой, голубкой, денницей\nКогда-то и я восторгался сторицей.\nТеперь я забыл их, пленяся одною\nМладою, родною, живою душою.\nОна всей любви и желаний царица,\nМне роза, лилея, голубка, денница.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Лилеею,_розой,_голубкой,_денницей_(Гейне;_Фет)", "sourceName": "Русская Викитека", "moodTags": ["нежность", "любование", "флирт"], "brief": "Ранний Гейне из «Книги песен» в переводе Фета: когда-то поэт восторгался лилией, розой, голубкой и зарёй — а теперь забыл их все, пленённый одной «младою, родною, живою душою». Она сама стала и розой, и лилеей, и голубкой, и денницей — «всей любви и желаний царица». Сжатое, сияющее признание, где вся красота мира сошлась в одном любимом лице."}, {"id": "fr-verlaine-nebosvod", "title": "Небосвод над этой крышей", "author": "Поль Верлен", "authorYears": "1844–1896", "translator": "Валерий Брюсов (1873–1924)", "country": "Франция", "year": "1881 / пер. 1899", "text": "Небосвод над этой крышей\nТак высок, так чист!\nТёмный вяз над этой крышей\nНаклоняет лист.\n\nВ небе синем и высоком\nКолокольный звон.\nЧу! на дереве высоком —\nПтицы тихий стон.\n\nБоже! всё, как в песне птицы,\nМирно предо мной,\nЛишь вдали звучит столицы\nЯростный прибой…\n\n— Что ж ты сделал, ты, что плачешь\nМного, много дней,\nЧто ж ты сделал, ты, что плачешь,\nС юностью своей?", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Небосвод_над_этой_крышей_(Верлен;_Брюсов)", "sourceName": "Русская Викитека", "moodTags": ["покой", "ночь", "светлая-грусть"], "brief": "Верлен смотрит в высокое чистое небо над крышей — колокол, тёмный вяз, тихая птица — и повторяет: «всё мирно предо мной». А следом, совсем тихо, — светлая грусть о прожитом: «что ж ты сделал… с юностью своей?». Умиротворённый вечер городской души в переводе Брюсова, где даже сожаление звучит примирённо."}, {"id": "fr-verlaine-lunnyy-svet", "title": "Лунный свет", "author": "Поль Верлен", "authorYears": "1844–1896", "translator": "Фёдор Сологуб (1863–1927)", "country": "Франция", "year": "1869 / пер. нач. XX в.", "text": "Твоя душа, как тот заветный сад,\nГде сходятся изысканные маски, —\nРазряжены они, но грустен взгляд,\nПечаль в напеве лютни, в шуме пляски.\n\nЭрота мощь, безоблачные дни\nОни поют, в минорный лад впадая,\nИ в счастие не веруют они,\nИ, песню их с лучом своим свивая,\n\nЛуна лесам и сны, и грёзы шлёт,\nЛуна печальная семье пернатой,\nИ рвётся к ней влюблённый водомёт,\nНагими мраморами тесно сжатый.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Стихи_(Верлен)", "sourceName": "Русская Викитека (пер. Ф. Сологуба)", "moodTags": ["ночь", "мечта", "светлая-грусть"], "brief": "Знаменитый «Clair de lune»: твоя душа — заветный сад, где бродят нарядные, но печальные маски с лютнями, поют о любви и не верят в счастье. А над ними льёт свой свет печальная луна, и рвётся к ней влюблённый фонтан среди мраморов. Верлен в переводе Сологуба — воплощённая лунная меланхолия, тонкая и прекрасная."}, {"id": "fr-verlaine-belaya-luna", "title": "Белая луна", "author": "Поль Верлен", "authorYears": "1844–1896", "translator": "Фёдор Сологуб (1863–1927)", "country": "Франция", "year": "1870 / пер. нач. XX в.", "text": "Белая луна\nСеет свет над лесом.\nЗвонкая слышна\nПод его навесом\nПесня соловья…\n\nМилая моя!\n\nВетер тихо плачет\nВ ветках над рекой,\nА внизу маячит,\nОтражён водой,\nТёмный ствол берёзы…\n\nВспомним наши грёзы.\n\nСходит к нам покой\nНежный, бесконечный\nС тверди голубой,\nГде сияет вечный,\nТихий звёздный строй…\n\nВ этот час ночной.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Стихи_(Верлен)", "sourceName": "Русская Викитека (пер. Ф. Сологуба)", "moodTags": ["ночь", "нежность", "покой"], "brief": "«La lune blanche» — тот самый «изысканный час»: белая луна сеет свет над лесом, поёт соловей, тихо плачет ветер в ветвях над рекой, и с голубой тверди сходит «нежный, бесконечный» покой. Каждая строфа замыкается тихим вздохом — «милая моя!», «вспомним наши грёзы», «в этот час ночной». Одно из самых убаюкивающих признаний в мировой лирике."}, {"id": "fr-verlaine-vot-osen", "title": "Вот осень наступила", "author": "Поль Верлен", "authorYears": "1844–1896", "translator": "Фёдор Сологуб (1863–1927)", "country": "Франция", "year": "1891 / пер. нач. XX в.", "text": "Вот осень наступила\nИ строго запретила\nПривычки лета длить.\nХолодные недели\nЗагонят нас в постели,\nЛаскаться и любить.\n\nА летом — что за скука!\nОдна и та же мука:\n«Ах, душно мне, — заснём!»\nНе жизнь, а сна вериги.\nМы скучны, точно книги.\nВот осень, отдохнём.\n\nКак угли в печке рдеют,\nУста у нас алеют,\nЗима ведёт любовь,\nИ запылаем сами\nМы пламенней, чем пламя,\nИ пламенней, чем кровь.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Стихи_(Верлен)", "sourceName": "Русская Викитека (пер. Ф. Сологуба)", "moodTags": ["чувственное", "лёгкое", "покой"], "brief": "Осень пришла и «строго запретила привычки лета длить» — а значит, холодные недели загонят влюблённых под одеяло «ласкаться и любить». Верлен превращает наступление холодов в уютное приглашение к теплу: пока угли рдеют и уста алеют, «зима ведёт любовь». Тёплый, чуть лукавый гимн осеннему уюту вдвоём."}, {"id": "fr-verlaine-ne-imeyu", "title": "Я не имею…", "author": "Поль Верлен", "authorYears": "1844–1896", "translator": "Фёдор Сологуб (1863–1927)", "country": "Франция", "year": "1891 / пер. нач. XX в.", "text": "Я не имею\nКопейки медной за душой,\nНо я владею,\nМоя проказница, тобой…\nС игрой и с пляской\nТворишь ты радостный обряд.\nКакою лаской\nТвои слова всегда горят!\n\nВнимаю ль речи\nТвоей живой, ловлю ль твой взгляд,\nНагие ль плечи\nТвои поцелую, — я богат.\nНа отдых нежный\nСклонился я — и вмиг весь пыл\nНа белоснежной\nТвоей груди восстановил.\n\nКонечно, мало,\nУвы! любим тобою я:\nТы изменяла\nМне часто, милая моя.\nНо что за дело\nМне до измен твоих, когда\nТы завладела\nМоей душою навсегда!", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Стихи_(Верлен)", "sourceName": "Русская Викитека (пер. Ф. Сологуба)", "moodTags": ["флирт", "чувственное", "нежность"], "brief": "У поэта нет ни копейки за душой — но он богат, потому что владеет ею, своей «проказницей», чьи слова горят лаской, а плечи хочется целовать. Верлен признаётся с обезоруживающей лёгкостью: пусть она и не слишком верна, но душой завладела навсегда. Игривое, тёплое, чуть озорное объяснение — флирт, за которым настоящая нежность."}, {"id": "ja-yoshitaka-ah-dazhe-zhiznyu", "title": "«Ах, даже жизнью…»", "author": "Фудзивара-но Ёситака", "authorYears": "954–974", "translator": "Николай Бахтин (Нович, 1866–1940)", "country": "Япония", "year": "X век / пер. 1905", "text": "Ах, даже жизнью,\nс тех пор, как полюбил я,\nне дорожил я, —\nи вдруг я снова жажду\nпрожить как можно дольше.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Ах,_даже_жизнью_(Фудзивара-но_Ёситака;_Нович)", "sourceName": "Русская Викитека («Песни ста поэтов»)", "moodTags": ["нежность", "лёгкое", "флирт"], "brief": "Танка из «Ста поэтов» (X век) в раннем русском переводе Николая Бахтина: пока любовь была безответной, поэт не дорожил и жизнью — но стоило ей ответить, и он вдруг захотел «прожить как можно дольше». Пять строк о том, как счастливая любовь заново привязывает к жизни. Тихое, светлое чудо в японском духе."}, {"id": "ja-fukayabu-byl-ranniy-vecher", "title": "«Был ранний вечер…»", "author": "Киёхара-но Фукаябу", "authorYears": "IX–X век", "translator": "Николай Бахтин (Нович, 1866–1940)", "country": "Япония", "year": "X век / пер. 1905", "text": "Был ранний вечер,\nа сумрак ночи летней\nуже спустился!\nЧего же это медлит\nлуна за облаками?", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Был_ранний_вечер_(Киёхара-но_Фукаябу;_Нович)", "sourceName": "Русская Викитека («Песни ста поэтов»)", "moodTags": ["ночь", "покой", "природа"], "brief": "Летняя ночь так коротка, что не успел спуститься вечерний сумрак — а уже светает; и поэт с улыбкой гадает: где же замешкалась луна, за какими облаками она заночует? Изящная танка из «Ста поэтов» о самой короткой и нежной поре года. Так и тянет посмотреть в окно перед сном."}, {"id": "ja-tomonori-v-cvetu-vishni", "title": "«В цвету стояли вишни…»", "author": "Ки-но Томонори", "authorYears": "IX век", "translator": "Александр Брандт (1912)", "country": "Япония", "year": "IX век / пер. 1912", "text": "В цвету стояли вишни. Чёрной гривой\nвзлетали волосы мои, когда я танцевал.\nВ цвету стояли вишни и блестел на\nветках свежий цвет. Я поседел.\nИ с новою весною те же вишни стоят\nв цвету. Я сед как лунь. В раздумьи\nя стою.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/В_цвету_стояли_вишни_(Томонори;_Брандт)", "sourceName": "Русская Викитека («Японская лирика», 1912)", "moodTags": ["природа", "светлая-грусть", "любование"], "brief": "Вишни цветут всё так же каждую весну — а поэт из чёрного стал седым как лунь. Ки-но Томонори (IX век) в переводе Александра Брандта укладывает в несколько строк целую жизнь: неизменную красоту цветенья и тихую перемену в человеке. Светлая, примирённая грусть о том, как прекрасен неспешный круг лет."}, {"id": "ja-koko-vesnoyu-s-polya", "title": "«Весною с поля…»", "author": "Император Коко", "authorYears": "830–887", "translator": "Николай Бахтин (Нович, 1866–1940)", "country": "Япония", "year": "IX век / пер. 1905", "text": "Весною с поля\nя для тебя срываю\nпобеги злаков,\nа между тем снежинки\nмне падают на плечи.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Весною_с_поля_(Коко;_Нович)", "sourceName": "Русская Викитека («Песни ста поэтов»)", "moodTags": ["нежность", "природа"], "brief": "Одна из самых нежных танка «Ста поэтов»: ради дорогого человека поэт выходит в раннее весеннее поле собирать первые побеги — и не замечает, как снежинки ложатся ему на плечи. Жест тихой преданности, в котором вся любовь — в самом действии, а не в словах. (В оригинале обращено к родному человеку, но его нежность годится для всякого, кто дорог.)"}, {"id": "zh-wang-changlin-nenufary", "title": "Ненюфары", "author": "Ван Чанлин", "authorYears": "698–756", "translator": "Константин Бальмонт (1867–1942)", "country": "Китай", "year": "VIII век / пер. 1908", "text": "Ненюфары, кувшинки, листами так схожи с цветной кисеёй,\nА цветы их так розовы нежно румянцем смеющихся лиц,\nЧто не знают глаза, где листы — кисеи, где цветок тут — речной,\nЛишь по пению — девушек видишь, меж трав, меж речных верениц.\n\nВ оны дни здесь любимицы Тцу, и красавицы Ю здесь толпой\nНенюфары срывали, река так была кисеёй их нежна,\nЧто теперь каждый венчик дрожит перед каждой поющей сестрой,\nИ в ночи над рекою ведёт их толпу снеговая Луна.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Ненюфары_(Ван_Чанлин;_Бальмонт)/1908_(ВТ)", "sourceName": "Русская Викитека (пер. К. Бальмонта, 1908)", "moodTags": ["чувственное", "ночь", "любование", "природа"], "brief": "Ван Чанлин (VIII век) в переводе Бальмонта: кувшинки-ненюфары так похожи на цветные платья, а цветы — на румяные смеющиеся лица, что глаз не отличит девушек от цветов, — только пение выдаёт их среди речных трав. И в ночи всю поющую вереницу ведёт по реке «снеговая Луна». Чувственная, мерцающая картина, где красота девушек и цветов сливается в лунном свете."}, {"id": "zh-du-fu-v-uroven-s-vodoy", "title": "В уровень с водой", "author": "Ду Фу", "authorYears": "712–770", "translator": "Константин Бальмонт (1867–1942)", "country": "Китай", "year": "VIII век / пер. 1908", "text": "Так быстро стремится ладья моя в зеркале вод,\nИ взор мой так быстро следит за теченьем реки.\nПрозрачная ночь, в облаках, обняла небосвод,\nПрозрачная ночь и в воде, где дрожат огоньки.\n\nЧуть тучка, блестя, пред Луной в высоте промелькнёт,\nЯ вижу в реке, как той тучки скользит хризолит.\nИ кажется мне, что ладья моя в Небе плывёт,\nИ кажется мне, что любовь моя в сердце глядит.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/В_уровень_с_водой_(Ду_Фу;_Бальмонт)/1908_(ВТ)", "sourceName": "Русская Викитека (пер. К. Бальмонта, 1908)", "moodTags": ["ночь", "покой", "мечта", "нежность"], "brief": "Ду Фу (VIII век) в переводе Бальмонта: лодка скользит по зеркалу вод в «прозрачную ночь», где небо с облаками и звёздами отражается в реке. Стоит облачку скользнуть перед луной — и оно хризолитом плывёт в воде; и поэту кажется, что лодка плывёт по самому Небу, а «любовь моя в сердце глядит». Тихое, невесомое ночное плавание между небом и водой."}, {"id": "en-shelley-filosofiya-lyubvi", "title": "Философия любви", "author": "Перси Биши Шелли", "authorYears": "1792–1822", "translator": "Константин Бальмонт (1867–1942)", "country": "Англия", "year": "1819 / пер. 1893", "text": "Ручьи сливаются с Рекою,\nРека стремится в Океан;\nНесётся ветер над Землёю,\nК нему ласкается Туман.\n\nВсе существа, как в дружбе тесной,\nВ союз любви заключены.\nО, почему ж, мой друг прелестный,\nС тобой мы слиться не должны? —\n\nСмотри, уходят к Небу горы,\nА волны к берегу бегут;\nЦветы, склоняя нежно взоры,\nКак брат к сестре, друг к другу льнут.\nЦелует Ночь — морские струи,\nА землю — блеск лучистый Дня:\nНо что мне эти поцелуи,\nКоль не целуешь ты меня?", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Философия_любви_(Шелли;_Бальмонт)/ПСС_1903_(ВТ:Ё)", "sourceName": "Русская Викитека (пер. К. Бальмонта)", "moodTags": ["флирт", "нежность", "природа"], "brief": "«Love's Philosophy» — самый обаятельный аргумент в пользу поцелуя: ручьи сливаются с рекой, ветер ласкает туман, горы тянутся к небу, волны — к берегу, «всё в союз любви заключено» — так почему же нам с тобой нельзя слиться? Шелли в переводе Бальмонта шутливо-нежно подводит весь мир к одному вопросу: «Но что мне эти поцелуи, коль не целуешь ты меня?». Флирт высшей пробы."}, {"id": "en-shelley-dobroy-nochi", "title": "Доброй ночи!", "author": "Перси Биши Шелли", "authorYears": "1792–1822", "translator": "Константин Бальмонт (1867–1942)", "country": "Англия", "year": "1820 / пер. 1893", "text": "Доброй ночи? О, нет, дорогая! Она\nНе добра, если гонит любовь мою прочь;\nПроведём её вместе с тобою без сна, —\nИ тогда будет добрая ночь!\n\nРазве может быть добрая ночь без тебя?\nРазве в силах я грусть о тебе превозмочь?\nНет, весь мир позабыть, трепеща и любя, —\nЭто добрая ночь!\n\nНочь лишь тем хороша, что мы ночью нежней,\nОт влюблённых сердец скорбь уносится прочь,\nНо не будем совсем говорить мы о ней, —\nИ тогда будет добрая ночь!", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Доброй_ночи_(Шелли;_Бальмонт)/ПСС_1903_(ВТ:Ё)", "sourceName": "Русская Викитека (пер. К. Бальмонта)", "moodTags": ["флирт", "ночь", "нежность"], "brief": "Идеальный стих для антологии «перед сном» — и притом лукавый: «Доброй ночи? О нет, дорогая! Она не добра, если гонит любовь мою прочь». Шелли переворачивает пожелание с ног на голову: настоящая добрая ночь — та, что влюблённые проводят вместе, забыв весь мир. В переводе Бальмонта — тёплое, улыбчивое объяснение под самое засыпание."}, {"id": "en-shelley-indiyskaya-melodiya", "title": "Индийская мелодия", "author": "Перси Биши Шелли", "authorYears": "1792–1822", "translator": "Константин Бальмонт (1867–1942)", "country": "Англия", "year": "1819 / пер. 1895", "text": "Я проснулся, задрожал,\nМне во сне явилась ты,\nНежный ветер чуть дышал,\nНочь светила с высоты:\n\nЯ проснулся, задрожал,\nИ не знаю почему,\nИ не знаю, как попал\nЯ к окошку твоему!\n\nТёплый воздух сладко спит\nНа замедлившей волне,\nДышит чампак, и молчит,\nКак видение во сне;\nУкоризны соловья\nГаснут, меркнут близ куста,\nКак умру, погасну я\nБлиз тебя, моя мечта!\n\nВ сердце жгучая тоска!\nЯ в сырой траве лежу!\nХолодна моя щека,\nЯ бледнею, я дрожу.\nПробудись же и приди,\nМы простимся поутру, —\nИ, прильнув к твоей груди,\nОт тревоги я умру!", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Индийская_мелодия_(Шелли;_Бальмонт)/ПСС_1903_(ВТ:Ё)", "sourceName": "Русская Викитека (пер. К. Бальмонта)", "moodTags": ["чувственное", "ночь", "мечта"], "brief": "«The Indian Serenade»: влюблённый просыпается от снов о ней, сам не помня, как оказался под её окном в напоённой ароматом ночи, где «дышит чампак» и гаснут трели соловья. Шелли доводит любовное томление до сладкого обморока — «прильнув к твоей груди, от тревоги я умру!». Знойная, будоражащая ночная серенада (в переводе Бальмонта) — не для покоя, а для сердцебиения."}, {"id": "en-shelley-k-lune", "title": "К луне", "author": "Перси Биши Шелли", "authorYears": "1792–1822", "translator": "Константин Бальмонт (1867–1942)", "country": "Англия", "year": "1820 / пер. 1893", "text": "Скиталица небес, печальная луна,\nКак скорбно с высоты на землю ты глядишь!\nНе потому ли ты бледна,\nНе потому ли ты грустишь,\nЧто между ярких звёзд свершать свой путь должна\nВсегда, везде — одна,\nНе зная на кого лучистый взор склонить,\nНе зная ничего, что можно полюбить!", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/К_луне_(Шелли;_Бальмонт)/ПСС_1903_(ВТ:Ё)", "sourceName": "Русская Викитека (пер. К. Бальмонта)", "moodTags": ["ночь", "светлая-грусть", "мечта"], "brief": "Восемь строк Шелли о луне как об одинокой скиталице небес: не оттого ли она бледна и печальна, что вечно бредёт среди ярких звёзд одна, «не зная, на кого лучистый взор склонить»? В переводе Бальмонта — нежная, чуть грустная ночная мысль, в которой каждый узнаёт и своё тихое одиночество, и своё тепло к тому, кто рядом."}, {"id": "pe-hafiz-ozero", "title": "«О, если бы озером был я ночным…»", "author": "Гафиз (перелож. Г. Ф. Даумера)", "authorYears": "перс. традиция · нем. XIX в.", "translator": "Афанасий Фет (1820–1892)", "country": "Персия", "year": "пер. 1859", "text": "О, если бы озером был я ночным,\nА ты луною, по нём плывущей!\nО, если б потоком я был луговым,\nА ты былинкой, над ним растущей!\nО, если бы розовым был я кустом,\nА ты бы розой, на нём растущей!\nО, если бы сладостным был я зерном,\nА ты бы птичкой, его клюющей!", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/О,_если_бы_озером_был_я_ночным_(Фет)", "sourceName": "Русская Викитека (Фет, «Из Гафиза»)", "moodTags": ["нежность", "ночь", "мечта", "чувственное"], "brief": "Из фетовского цикла «Из Гафиза» (честно: это вольные подражания Хафизу, сочинённые немцем Даумером и переведённые Фетом): вереница «о, если бы…» рисует всё новое слияние — я озеро, ты луна над ним; я куст, ты роза на нём; я зерно, ты птичка, что его клюёт. Нежное, чуть чувственное желание быть неразлучными во всём."}, {"id": "pe-hafiz-aromat-kudrey", "title": "«Ах, как сладко, сладко дышит…»", "author": "Гафиз (перелож. Г. Ф. Даумера)", "authorYears": "перс. традиция · нем. XIX в.", "translator": "Афанасий Фет (1820–1892)", "country": "Персия", "year": "пер. 1859", "text": "Ах, как сладко, сладко дышит\nАромат твоих кудрей!\nНо ещё дышал бы слаще\nАромат души твоей.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Ах,_как_сладко,_сладко_дышит_(Фет)", "sourceName": "Русская Викитека (Фет, «Из Гафиза»)", "moodTags": ["нежность", "чувственное", "флирт"], "brief": "Четыре строки из фетовского «Из Гафиза» (вольное подражание Хафизу через немца Даумера): как сладко благоухают её кудри — но ещё слаще дышал бы аромат её души. Крошечный, безупречно изящный комплимент, в котором чувственное мгновенно переходит в нежное."}, {"id": "pe-hafiz-veter-nezhnyy", "title": "«Ветер нежный, окрылённый…»", "author": "Гафиз (перелож. Г. Ф. Даумера)", "authorYears": "перс. традиция · нем. XIX в.", "translator": "Афанасий Фет (1820–1892)", "country": "Персия", "year": "пер. 1859", "text": "Ветер нежный, окрылённый,\nБлаговестник красоты,\nОтнеси привет мой страстный\nТой одной, что знаешь ты.\n\nРасскажи ей, что со света\nУнесут меня мечты,\nЕсли мне от ней не будет\nТех наград, что знаешь ты.\n\nПотому что под запретом\nВидеть райские цветы\nТяжело — и сердце гложет\nТа печаль, что знаешь ты.\n\nИ на что цветы Эдема,\nЕсли в душу пролиты\nАроматы той долины,\nТех цветов, что знаешь ты?\n\nНе орлом я быть желаю\nИ парить на высоты;\nСоловей Гафиз ту розу\nБудет петь, что знаешь ты.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Ветер_нежный,_окрыленный_(Фет)", "sourceName": "Русская Викитека (Фет, «Из Гафиза»)", "moodTags": ["нежность", "мечта", "чувственное"], "brief": "«Ветер нежный, окрылённый, благовестник красоты, отнеси привет мой страстный той одной, что знаешь ты» — с этим рефреном поэт-соловей шлёт ветру весть своей розе. Из фетовского «Из Гафиза» (по мотивам Хафиза, через Даумера): вся персидская лирика розы и соловья в одном певучем напеве, где страсть остаётся лёгкой."}, {"id": "pe-hafiz-zvezda-polunochi", "title": "«Звезда полуночи дугой золотою скатилась…»", "author": "Гафиз (перелож. Г. Ф. Даумера)", "authorYears": "перс. традиция · нем. XIX в.", "translator": "Афанасий Фет (1820–1892)", "country": "Персия", "year": "пер. 1859", "text": "Звезда полуночи дугой золотою скатилась,\nНа лоно земное с его суетою скатилась.\n\nЦветы там она увидала и травы долины\nИ радостной их и живой пестротою пленилась.\n\nОна услыхала звонки говорливые стада\nИ мелких серебряных звуков игрою пленилась.\n\nКоня увидала она, проскакавшего в поле,\nИ лошади статной летучей красою пленилась.\n\nИ мирными кровами хижин она и деревьев,\nИ даже убогой гнилушкой лесною пленилась.\n\nИ, всё полюбя, уж на небо она не просилась —\nИ рада была, что ночною порою скатилась.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Звезда_полуночи_дугой_золотою_скатилась_(Фет)", "sourceName": "Русская Викитека (Фет, «Из Гафиза»)", "moodTags": ["ночь", "любование", "мечта"], "brief": "Полночная звезда скатывается с высокого неба на землю — и, зачарованная цветами, травами, стадами, летящим конём и даже трухлявой лесной гнилушкой, влюбляется во всё земное так, что уже не просится обратно. Из фетовского «Из Гафиза» — тихий ночной гимн красоте здешнего мира, от которого становится спокойно и радостно."}, {"id": "ru-lohvickaya-vlasti-gryoz", "title": "«Власти грёз отдана…»", "author": "Мирра Лохвицкая", "authorYears": "1869–1905", "country": "Россия", "year": "1899", "text": "Власти грёз отдана,\nЗатуманена снами,\nЖизнь скользит, как волна,\nЗа другими волнами.\n\nДальний путь одинок.\nВ океане широком\nЯ кружусь, как цветок,\nЗанесённый потоком.\n\nБлизко ль берег родной,\nНе узнаю вовеки,\nВ край плыву я иной,\nГде сливаются реки.\n\nИ зачем одинок\nПуть на море широком —\nНе ответит цветок,\nЗанесённый потоком.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Власти_грез_отдана_(Лохвицкая)", "sourceName": "Русская Викитека", "moodTags": ["мечта", "светлая-грусть", "покой"], "brief": "Мирра Лохвицкая, «русская Сафо» Серебряного века: жизнь, «власти грёз отдана, затуманена снами», скользит, как волна за волнами, а сама она — цветок, занесённый потоком в неведомый край, «где сливаются реки». Тихое, убаюкивающее кружение на грани сна и яви, без тревоги — только мягкое приятие пути."}, {"id": "it-petrarca-blagoslovlyayu", "title": "«Благословляю день, и месяц, и годину…»", "author": "Франческо Петрарка", "authorYears": "1304–1374", "translator": "Дмитрий Мин (1818–1885)", "country": "Италия", "year": "XIV век / пер. 1888", "text": "Благословляю день, и месяц, и годину,\nИ час божественный, и чудное мгновенье,\nИ тот волшебный край, где зрел я, как виденье,\nПрекрасные глаза, всех мук моих причину.\n\nБлагословляю скорбь и первую кручину,\nВ какую вверг меня Амур в жестоком мщенье,\nИ страшный лук его, и стрел его язвленье,\nИ боль сердечных ран, с которой жизнь покину.\n\nБлагословляю все те нежные названья,\nКакими призывал её к себе, — все стоны,\nВсе вздохи, слёзы все и страстные желанья.\n\nБлагословляю все сонеты и канцоны,\nЕй в честь сложенные, и все мои мечтанья,\nВ каких явился мне прекрасный образ донны!", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Благословляю_день,_и_месяц,_и_годину_(Петрарка;_Мин)", "sourceName": "Русская Викитека (пер. Д. Мина)", "moodTags": ["нежность", "любование", "мечта"], "brief": "Самый знаменитый сонет Петрарки к Лауре в переводе Дмитрия Мина: поэт благословляет всё — день, месяц, час и край, где впервые увидел «прекрасные глаза», и даже сладкую боль любви, и все стихи, что сложил ей в честь. Чистый восторг влюблённости, где даже мука названа блаженством, — сонет, на века заложивший канон любовной лирики Запада."}, {"id": "de-goethe-prekrasnaya-noch", "title": "Прекрасная ночь", "author": "Иоганн Вольфганг фон Гёте", "authorYears": "1749–1832", "translator": "Афанасий Фет (1820–1892)", "country": "Германия", "year": "1768 / пер. 1840", "text": "Оставляю домик милой,\nНежной девицы души,\nИ спешу с душой унылой\nПобродить в ночной глуши.\nЛунные лучи пронзают\nСвод древесный там и сям,\nИ берёзы воссылают\nК небу сладкий фимиам.\n\nКак здесь тихо и прохладно\nПод навесами ветвей;\nЗдесь душе моей отрадно,\nИ понятно счастье ей.\nНочь — восторг! — Но, месяц ясный,\nТысячи возьми их прочь,\nЕсли мне мой друг прекрасный\nПодарит одну лишь ночь.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Прекрасная_ночь_(Оставляю_домик_милой_—_Гёте;_Фет)", "sourceName": "Русская Викитека (пер. А. Фета)", "moodTags": ["ночь", "нежность", "флирт"], "brief": "Юный Гёте (в переводе Фета) выходит из домика милой побродить лунной ночью: лучи пронзают лесной свод, берёзы шлют небу «сладкий фимиам», и душе так отрадно. А в конце — обезоруживающее: «месяц ясный, тысячи таких ночей возьми прочь, если мне мой друг прекрасный подарит одну лишь ночь». Ночная нежность с лёгким флиртом."}, {"id": "de-goethe-blizost-lyubovnikov", "title": "Близость любовников", "author": "Иоганн Вольфганг фон Гёте", "authorYears": "1749–1832", "translator": "Антон Дельвиг (1798–1831)", "country": "Германия", "year": "1795 / пер. 1810-е", "text": "Блеснёт заря, и всё в моём мечтаньи\nЛишь ты одна,\nЛишь ты одна, когда поток в молчаньи\nСребрит луна.\n\nЯ зрю тебя, когда летит с дороги\nИ пыль, и прах\nИ с трепетом идёт прошлец убогий\nВ глухих лесах.\n\nМне слышится твой голос несравненный\nИ в шуме вод;\nПод вечер он к дубраве оживленной\nМеня зовёт.\n\nЯ близ тебя; как не была б далёко,\nТы всё ж со мной.\nВзошла луна. Когда б в сей тьме глубокой\nЯ был с тобой!", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Близость_любовников_(Гёте;_Дельвиг)", "sourceName": "Русская Викитека (пер. А. Дельвига)", "moodTags": ["нежность", "ночь", "мечта"], "brief": "«Nähe des Geliebten» Гёте в раннем переводе лицейского друга Пушкина — Антона Дельвига: на заре, в серебре луны над потоком, в дорожной пыли, в шуме вод — всюду «лишь ты одна». Возлюбленная незримо рядом, как ни была бы далека; и лишь тихий вздох под взошедшей луной: «когда б в сей тьме глубокой я был с тобой!». Нежность присутствия сквозь любую даль."}, {"id": "de-goethe-mayskaya-pesnya", "title": "Майская песня", "author": "Иоганн Вольфганг фон Гёте", "authorYears": "1749–1832", "translator": "Афанасий Фет (1820–1892)", "country": "Германия", "year": "1771 / пер.", "text": "Всё нежит взоры,\nВсё нежит слух,\nБлистает солнце,\nСмеётся луг.\n\nЯ вижу, ветви\nПолны цветов;\nЯ слышу птичек\nИз-за кустов;\n\nВосторг и нега\nТеснятся в грудь…\nО, счастье, счастье,\nПродлись, побудь!\n\nНе ты ли это,\nЛюбовь, любовь,\nОдела жизнью\nПрироду вновь,\n\nБлагословила\nЛуг молодой\nИ расцветила\nВесь круг земной?\n\nО, дева, как я\nЛюблю тебя!\nКак взор твой светел!\nЛюби меня!\n\nКак сладко птичке\nПоутру петь,\nИль пышной розе\nЗарёй алеть,\n\nТак сладко, дева,\nТебя любить.\nТобой воскреснуть,\nТобою жить.\n\nТы оживила\nМои мечты,\nБудь век счастлива,\nКак любишь ты.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Майская_песня_(Гёте;_Фет)", "sourceName": "Русская Викитека (пер. А. Фета)", "moodTags": ["любование", "нежность", "лёгкое"], "brief": "«Mailied» — ликующий гимн юного Гёте маю и любви (в переводе Фета): солнце блистает, смеётся луг, ветви полны цветов — и всё это оживила любовь. «О, дева, как я люблю тебя! Как взор твой светел! Люби меня!». Захлёбывающийся счастьем стих, от которого само собой теплеет на душе — один из самых радостных в мировой лирике."}, {"id": "ja-saigyo-luna-li-eto", "title": "«Луна ли это…»", "author": "Сайгё", "authorYears": "1118–1190", "translator": "Николай Бахтин (Нович, 1866–1940)", "country": "Япония", "year": "XII век / пер. 1905", "text": "Луна ли это,\nчто вздохи вызывает\nи скорбью страстной\nменя волнует? Или\nслеза из глаз печальных?", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Луна_ли_это_(Сайгё;_Нович)", "sourceName": "Русская Викитека («Песни ста поэтов»)", "moodTags": ["ночь", "светлая-грусть", "мечта"], "brief": "Танка священника-странника Сайгё (XII век) в переводе Николая Бахтина: не луна ли будит эти вздохи и «скорбь страстную» — или всё же это просто слеза из печальных глаз? Тихий ночной вопрос, в котором любовное томление и красота луны становятся неразделимы."}, {"id": "ja-komachi-poblekli-kraski", "title": "«Поблекли краски…»", "author": "Оно-но Комати", "authorYears": "ок. 825 – ок. 900", "translator": "Николай Бахтин (Нович, 1866–1940)", "country": "Япония", "year": "IX век / пер. 1905", "text": "Поблекли краски,\nцветы завять успели,\nпока по свету\nблуждала я, беспечно\nскользя повсюду взором!", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Поблекли_краски_(Комати;_Нович)", "sourceName": "Русская Викитека («Песни ста поэтов»)", "moodTags": ["светлая-грусть", "любование", "мечта"], "brief": "Знаменитейшая танка легендарной красавицы-поэтессы Оно-но Комати (IX век): краски поблекли, цветы отцвели — пока она беспечно скользила взором по свету. В японском тут двойной смысл (цветенье вишни и её собственная красота, долгий дождь и долгий взгляд), и всё вместе — тихое, светлое сожаление о том, как незаметно проходит прекрасное."}, {"id": "ja-sosei-hot-obeshchala", "title": "«Хоть обещала…»", "author": "Сосэй", "authorYears": "IX–X век", "translator": "Николай Бахтин (Нович, 1866–1940)", "country": "Япония", "year": "IX век / пер. 1905", "text": "Хоть обещала,\nчто ждать ты не заставишь,\nно ждал я долго,\nпока — увы! — под утро\nлуна не показалась!", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Хоть_обещала_(Сосэй;_Нович)", "sourceName": "Русская Викитека («Песни ста поэтов»)", "moodTags": ["ночь", "нежность", "светлая-грусть"], "brief": "Всю ночь напролёт влюблённый ждёт ту, что обещала не заставлять себя ждать, — и дожидается лишь бледной предрассветной луны. Танка священника Сосэй (IX век): нежное, чуть смешливое разочарование, знакомое каждому, кто ждал до рассвета."}, {"id": "ja-yoshitada-doroga-strasti", "title": "«Дорога страсти…»", "author": "Сонэ-но Ёситада", "authorYears": "X век", "translator": "Николай Бахтин (Нович, 1866–1940)", "country": "Япония", "year": "X век / пер. 1905", "text": "Дорога страсти\nведёт к безвестной цели,\nподобно лодке,\nчто, без руля и вёсел,\nскользит проливом Юра.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Дорога_страсти_(Сонэ-но_Ёситада;_Нович)", "sourceName": "Русская Викитека («Песни ста поэтов»)", "moodTags": ["чувственное", "мечта", "светлая-грусть"], "brief": "Пятистишие Сонэ-но Ёситада (X век): путь страсти ведёт неведомо куда — как лодка без руля и вёсел, что скользит по бурному проливу Юра. Образ любви, отдавшейся течению, — тревожно-сладкое чувство несомого потоком сердца."}, {"id": "ja-korenori-tot-sneg", "title": "«Тот снег, что выпал…»", "author": "Саканоуэ-но Корэнори", "authorYears": "X век", "translator": "Николай Бахтин (Нович, 1866–1940)", "country": "Япония", "year": "X век / пер. 1905", "text": "Тот снег, что выпал\nв селе Йошино за ночь,\nво мгле рассвета\nблестит, как будто залит\nлуны сияньем бледным.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Тот_снег,_что_выпал_(Саканоуэ-но_Корэнори;_Нович)", "sourceName": "Русская Викитека («Песни ста поэтов»)", "moodTags": ["природа", "покой", "ночь"], "brief": "Снег, выпавший за ночь в горном селе Ёсино, блестит в предрассветной мгле так, что кажется — это разлит бледный лунный свет. Танка Саканоуэ-но Корэнори (X век): чистая, беззвучная зимняя картина, где рассвет и луна на миг становятся неразличимы."}, {"id": "it-petrarca-stol-sladkoy-negoy", "title": "«Столь сладкой негой, что сказать не в силах…»", "author": "Франческо Петрарка", "authorYears": "1304–1374", "translator": "Михаил Кузмин (1872–1936)", "country": "Италия", "year": "XIV век / пер. нач. XX в.", "text": "Столь сладкой негой, что сказать не в силах,\nВ твоих чертах небесных всё дышало\nВ тот день, когда ослепнуть сердце ждало,\nДругих не видеть чтоб красот унылых.\n\nГде ж тот блаженный миг?! Но черт тех милых,\nНебесных черт душа моя искала.\nВсё, где тебя нет, тотчас принимало\nПечали цвет явлений, мне постылых.\n\nВ долине тёмной, что ряд гор обводит,\nНайду ли вздохам я покой усталым?\nПойду туда искать я тень свободы,\n\nГде женщин нету, только лес да воды.\nИ всё же память мне тот день приводит,\nСтремя мой дух к тем радостям бывалым.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Столь_сладкой_негой,_что_сказать_не_в_силах_(Петрарка;_Кузмин)", "sourceName": "Русская Викитека (пер. М. Кузмина)", "moodTags": ["нежность", "мечта", "светлая-грусть"], "brief": "Сонет Петрарки в переводе Михаила Кузмина: в тот день её небесные черты дышали «столь сладкой негой», что сердце готово было ослепнуть, лишь бы не видеть иных, унылых красот. С тех пор всё, где её нет, окрашено печалью, — но память вновь и вновь возвращает тот блаженный миг. Нежная тоска по одному-единственному прекрасному дню."}, {"id": "us-longfellow-den-proshel", "title": "«День прошёл, и покровы…»", "author": "Генри Уодсворт Лонгфелло", "authorYears": "1807–1882", "translator": "А. А. Брандт (1855–1933)", "country": "США", "year": "1844 / пер. 1918", "text": "День прошёл, и покровы\nПадают с ночи крыла,\nКак падают перья с крыльев\nПарящего в небе орла.\n\nЯ вижу свет в деревне, —\nОн блестит сквозь туман и дождь;\nА в душе тоска и томленье,\nИ нет сил, чтобы их превозмочь.\n\nПростую красивую сказку\nИль поэму приди почитать,\nЧтобы это тоскливое чувство\nИ мысли дня отогнать.\n\nНе читай из великих поэтов,\nЧьих стихов торжественный тон,\nИ слова, и шаги раздаются\nВдоль коридоров времён.\n\nКак звуки военного марша,\nИх песни звучат, и с собой\nНесут они жизни волненья…\nА сегодня мне нужен покой.\n\nИзбери поскромнее поэта,\nЧья песнь из груди лилась,\nКак льётся из туч летний ливень,\nКак льются слёзы из глаз.\n\nПрочти ж из заветной книги,\nЧто скромный поэт нам поёт.\nТвой голос в стихи поэта\nОсобую прелесть вольёт.\n\nНочь будет полна этих звуков,\nА заботы часов и минут,\nПалатки сложив, как цыгане,\nКрадучись, тихо уйдут.", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/День_прошёл,_и_покровы_(Лонгфелло;_А._А._Брандт)", "sourceName": "Русская Викитека (пер. А. Брандта, 1918)", "moodTags": ["ночь", "покой", "светлая-грусть"], "brief": "«The Day is Done» — возможно, лучший в мире стих про чтение перед сном, сам собою просящийся в эту антологию. Лонгфелло (в переводе Брандта) просит почитать ему на ночь не громких классиков, а скромного, сердечного поэта — чтобы «тоскливое чувство и мысли дня отогнать». И тогда заботы дня, «палатки сложив, как цыгане, крадучись, тихо уйдут». Идеальный финал для вечера. (Приведены избранные строфы; полностью — по ссылке.)"}, {"id": "es-espronceda-k-nochi", "title": "К ночи", "author": "Хосе де Эспронседа", "authorYears": "1808–1842", "translator": "Константин Бальмонт (1867–1942)", "country": "Испания", "year": "1830-е / пер. 1919", "text": "Привет тебе, Ночь покоя,\nТы мир обняла величаво,\nВ печальном тревогу смягчаешь\nПриятной твоей темнотой.\n\nРучей вдалеке серебрится,\nТеперь он лепечет тихонько,\nИ между ветвями певуче\nНеясный шуршит ветерок.\n\nГора затянулась тенями,\nЛужайки окутались в сумрак,\nИ звёзды прерывистым светом\nЧуть светят, заполнив простор.\n\nВ твоём примирённом покое,\nО, Ночь, все находят свой отдых,\nИ даже, кто горестный плачет,\nГлаза осушаешь ты сном.\n\nПоёт соловей для супруги,\nИзменчиво-разною песней\nЕё он баюкает нежно,\nЕдинственный в чаще лесной.\n\nПривет, о, подруга печальных,\nТоску огорчённого сердца\nСмягчаешь ты нежным бальзамом,\nИ только в тебе есть покой.", "isFullText": false, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/К_ночи_(Эспронседа;_Бальмонт)", "sourceName": "Русская Викитека (пер. К. Бальмонта, 1919)", "moodTags": ["ночь", "покой", "нежность"], "brief": "Романтическая ода ночи испанца Хосе де Эспронседы в переводе Бальмонта: «Привет тебе, Ночь покоя, ты мир обняла величаво». Серебрится ручей, всходит луна, соловей «баюкает нежно» подругу, и всё живое находит отдых — «и только в тебе есть покой». Здесь избранные строфы длинной оды; полностью — по ссылке."}, {"id": "es-lorca-selenye", "title": "Селенье", "author": "Федерико Гарсиа Лорка", "authorYears": "1898–1936", "translator": "Марина Цветаева (1892–1941)", "country": "Испания", "year": "1921 / пер.", "text": "На темени горном,\nНа темени голом —\nЧасовня.\nВ жемчужные воды\nСтолетие никнут\nМаслины.\nРасходятся люди в плащах,\nА на башне\nВращается флюгер,\nВращается денно,\nВращается нощно,\nВращается вечно.\nО, где-то затерянное селенье\nВ моей Андалусии\nСлёзной…", "isFullText": true, "copyright": "public-domain", "sourceUrl": "https://ru.wikisource.org/wiki/Селенье_(Лорка;_Цветаева)", "sourceName": "Русская Викитека (пер. М. Цветаевой)", "moodTags": ["покой", "светлая-грусть", "ночь"], "brief": "Крошечная андалусская зарисовка Федерико Гарсиа Лорки в переводе Марины Цветаевой: часовня на голом горном темени, маслины, никнущие в жемчужные воды, вечно вращающийся флюгер — и вздох о «где-то затерянном селенье в моей Андалусии слёзной». Тихий, застывший вне времени образ, полный мягкой печали."}];
