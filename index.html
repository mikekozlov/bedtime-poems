  "Венгрия":{flag:"🇭🇺"},"Грузия":{flag:"🇬🇪"},"Армения":{flag:"🇦🇲"},"Шотландия ":{flag:"🏴"}
};
const flagOf = c => (COUNTRY_META[c] && COUNTRY_META[c].flag) || "📜";

const MOODS = [
  ["ночь","🌙 ночь и сон"],["нежность","🤍 нежность"],["природа","🍃 природа"],
  ["покой","🕯️ тишина и покой"],["мечта","✨ мечта"],["светлая-грусть","🌒 светлая грусть"],
  ["любование","🌸 любование"],["лёгкое","🙂 лёгкое"],["флирт","😏 флирт"],["чувственное","🌹 чувственное"]
];
const MOOD_LABEL = Object.fromEntries(MOODS.map(m=>[m[0],m[1]]));

const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem("bp:"+k);return v==null?d:JSON.parse(v)}catch(e){return d}},
  set:(k,v)=>{try{localStorage.setItem("bp:"+k,JSON.stringify(v))}catch(e){}}
};

const state = {
  tab:"index",
  query:"",
  mood:null,
  fav:new Set(LS.get("fav",[])),
  fs:LS.get("fs",1.12),
  reader:{list:[],i:0}
};

const $ = s => document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e};
const esc = s => (s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const slug = s => s;

function countries(){
  const seen=[];
  DATA.forEach(p=>{if(!seen.includes(p.country))seen.push(p.country)});
  return seen;
}
function poemsOf(c){return DATA.filter(p=>p.country===c)}
function readingSecs(p){const w=(p.text||"").trim().split(/\s+/).length;return Math.max(20,Math.round(w/3.2))}
function lenLabel(p){const s=readingSecs(p);return s<60?`~${s} сек`:`~${Math.round(s/60)} мин`}

/* ---------- theme & font ---------- */
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);$("#themeBtn").textContent=t==="dark"?"🌙":"☀️";LS.set("theme",t)}
function applyFs(){document.documentElement.style.setProperty("--fs",state.fs.toFixed(2)+"rem");LS.set("fs",state.fs)}

/* ---------- tabs ---------- */
function buildTabs(){
  const bar=$("#tabbar");bar.innerHTML="";
  const idx=el("button","tab"+(state.tab==="index"?" active":""),"📖 Оглавление");
  idx.dataset.go="index";bar.appendChild(idx);
  countries().forEach(c=>{
    const n=poemsOf(c).length;
    const b=el("button","tab"+(state.tab===c?" active":""),`${flagOf(c)} ${esc(c)} <span class="cnt">${n}</span>`);
    b.dataset.go=c;bar.appendChild(b);
  });
  bar.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>goTab(b.dataset.go)));
}
function goTab(name){
  state.tab=name;
  buildTabs();
  render();
  window.scrollTo({top:0,behavior:"smooth"});
  const active=$("#tabbar .tab.active");if(active)active.scrollIntoView({block:"nearest",inline:"center"});
}

/* ---------- cards ---------- */
function card(p,listCtx){
  const c=el("div","card");
  const meta=el("div","meta");
  meta.appendChild(el("h3",null,esc(p.title)));
  const fav=el("button","fav"+(state.fav.has(p.id)?" on":""),state.fav.has(p.id)?"♥":"♡");
  fav.title="В избранное";
  fav.addEventListener("click",e=>{e.stopPropagation();toggleFav(p.id);fav.classList.toggle("on");fav.textContent=state.fav.has(p.id)?"♥":"♡"});
  meta.appendChild(fav);
  c.appendChild(meta);

  let who=`${esc(p.author)} <span class="yr">· ${esc(p.authorYears||"")}</span>`;
  if(p.translator) who+=`<br>перевод: ${esc(p.translator)}`;
  c.appendChild(el("div","who",who));

  if(p.moodTags&&p.moodTags.length){
    const tg=el("div","tags");
    p.moodTags.forEach(m=>tg.appendChild(el("span","tag",esc(MOOD_LABEL[m]||m))));
    c.appendChild(tg);
  }
  if(p.brief)c.appendChild(el("div","brief",esc(p.brief)));

  const long=(p.text||"").split("\n").length>15;
  const poem=el("div","poem"+(long?" clamp":""),esc(p.text));
  c.appendChild(poem);

  if(!p.isFullText)c.appendChild(el("div","excerpt-note","Отрывок — полный текст под авторскими правами. Читать целиком по ссылке ниже."));

  const foot=el("div","card-foot");
  const rd=el("a","lnk rd","📖 Читать");rd.href="javascript:void 0";
  rd.addEventListener("click",e=>{e.preventDefault();openReader(listCtx,listCtx.indexOf(p))});
  foot.appendChild(rd);
  if(p.sourceUrl){
    const src=el("a","lnk",(p.isFullText?"🔗 Источник":"🔗 Читать полностью")+` · ${esc(p.sourceName||"источник")}`);
    src.href=p.sourceUrl;src.target="_blank";src.rel="noopener";
    foot.appendChild(src);
  }
  if(long){
    const more=el("button","more","Развернуть ▾");
    more.addEventListener("click",()=>{const cl=poem.classList.toggle("clamp");more.textContent=cl?"Развернуть ▾":"Свернуть ▴"});
    foot.appendChild(more);
  }
  foot.appendChild(el("span","len",lenLabel(p)));
  c.appendChild(foot);
  return c;
}

/* ---------- render ---------- */
function render(){
  const m=$("#main");m.innerHTML="";
  if(state.tab==="index")renderIndex(m);else renderCountry(m,state.tab);
  updateBrand();
}
function updateBrand(){
  $("#brandTitle").textContent = META.title;
  $("#brandSub").textContent = META.subtitle;
  document.title = META.title + " · тёплые стихи";
}
function matches(p){
  if(state.mood && !(p.moodTags||[]).includes(state.mood))return false;
  if(state.query){
    const q=state.query.toLowerCase();
    const hay=(p.title+" "+p.author+" "+(p.text||"")+" "+(p.brief||"")+" "+p.country).toLowerCase();
    if(!hay.includes(q))return false;
  }
  return true;
}
function renderIndex(m){
  const col=el("div");
  col.appendChild(el("p","lead",esc(META.lead)));
  col.appendChild(el("p","sub",esc(META.sub)));

  const tb=el("div","toolbar");
  const search=el("input","search");search.type="search";search.placeholder="Поиск: название, автор, слово из стиха…";search.value=state.query;
  search.addEventListener("input",()=>{state.query=search.value.trim();renderFiltered(res)});
  tb.appendChild(search);
  const pills=el("div","pills");
  MOODS.forEach(([k,lab])=>{
    if(!DATA.some(p=>(p.moodTags||[]).includes(k)))return;
    const b=el("button","pill"+(state.mood===k?" on":""),esc(lab));
    b.addEventListener("click",()=>{state.mood=state.mood===k?null:k;pills.querySelectorAll(".pill").forEach(x=>x.classList.remove("on"));if(state.mood)b.classList.add("on");renderFiltered(res)});
    pills.appendChild(b);
  });
  tb.appendChild(pills);
  col.appendChild(tb);

  const res=el("div");col.appendChild(res);

  // favorites
  const favList=DATA.filter(p=>state.fav.has(p.id));
  if(favList.length){
    col.appendChild(el("div","sec-title","♥ Избранное"));
    const fc=el("div");favList.forEach(p=>fc.appendChild(card(p,favList)));col.appendChild(fc);
  }

  // country navigation
  col.appendChild(el("div","sec-title","Страны — выбери вкладку"));
  const grid=el("div","country-grid");
  countries().forEach(c=>{
    const chip=el("div","country-chip",`<span class="fl">${flagOf(c)}</span><span class="nm">${esc(c)}</span><span class="cnt">${poemsOf(c).length}</span>`);
    chip.addEventListener("click",()=>goTab(c));grid.appendChild(chip);
  });
  col.appendChild(grid);

  col.appendChild(el("div","note",META.note));
  m.appendChild(col);

  function renderFiltered(host){
    host.innerHTML="";
    if(!state.query && !state.mood)return; // show nothing until user searches/filters
    const found=DATA.filter(matches);
    host.appendChild(el("div","sec-title",`Найдено: ${found.length}`));
    if(!found.length){host.appendChild(el("div","empty","Ничего не нашлось — попробуй другое слово или настроение."));return}
    found.forEach(p=>host.appendChild(card(p,found)));
  }
  renderFiltered(res);
}
function renderCountry(m,c){
  const col=el("div","col");
  const list=poemsOf(c);
  const head=el("div","country-head",`<span class="fl">${flagOf(c)}</span><h2>${esc(c)}</h2><span class="cnt">${list.length} ${plural(list.length)}</span>`);
  col.appendChild(head);
  if(!list.length)col.appendChild(el("div","empty","Здесь пока пусто."));
  list.forEach(p=>col.appendChild(card(p,list)));
  m.appendChild(col);
}
function plural(n){const a=Math.abs(n)%100,b=a%10;if(a>10&&a<20)return"стихов";if(b>1&&b<5)return"стиха";if(b===1)return"стих";return"стихов"}

/* ---------- favorites ---------- */
function toggleFav(id){if(state.fav.has(id))state.fav.delete(id);else state.fav.add(id);LS.set("fav",[...state.fav])}

/* ---------- reader ---------- */
function openReader(list,i){
  state.reader={list,i};
  paintReader();
  $("#reader").classList.add("on");$("#reader").setAttribute("aria-hidden","false");
  document.body.style.overflow="hidden";
}
function paintReader(){
  const {list,i}=state.reader;const p=list[i];if(!p)return;
  const inner=$("#readerInner");
  let who=`${esc(p.author)} · ${esc(p.authorYears||"")}${p.translator?" · пер. "+esc(p.translator):""}`;
  let src=p.sourceUrl?`<a class="src" href="${esc(p.sourceUrl)}" target="_blank" rel="noopener">🔗 ${esc(p.isFullText?"источник":"полный текст")} · ${esc(p.sourceName||"")}</a>`:"";
  let note=!p.isFullText?`<div class="excerpt-note" style="text-align:center">Отрывок — полный текст по ссылке.</div>`:"";
  inner.innerHTML=`<h3>${esc(p.title)}</h3><div class="who">${flagOf(p.country)} ${who}</div><div class="poem">${esc(p.text)}</div>${note}<div>${src}</div>`;
  $("#readerCrumb").textContent=`${flagOf(p.country)} ${p.country} · ${i+1} из ${list.length}`;
  $("#readerPrev").disabled=i<=0;
  $("#readerNext").disabled=i>=list.length-1;
  LS.set("last",p.id);
}
function readerMove(d){const n=state.reader.i+d;if(n<0||n>=state.reader.list.length)return;state.reader.i=n;paintReader();$("#readerInner").scrollTo?.(0,0)}
function closeReader(){$("#reader").classList.remove("on");$("#reader").setAttribute("aria-hidden","true");document.body.style.overflow=""}

/* ---------- random ---------- */
function randomPoem(){
  if(!DATA.length)return;
  const p=DATA[Math.floor(Math.random()*DATA.length)];
  const list=poemsOf(p.country);
  openReader(list,list.indexOf(p));
}

/* ---------- wire ---------- */
function init(){
  const savedTheme=LS.get("theme","dark");applyTheme(savedTheme);
  applyFs();
  buildTabs();render();

  $("#themeBtn").addEventListener("click",()=>applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark"));
  $("#fsPlus").addEventListener("click",()=>{state.fs=Math.min(1.6,state.fs+0.06);applyFs()});
  $("#fsMinus").addEventListener("click",()=>{state.fs=Math.max(0.92,state.fs-0.06);applyFs()});
  $("#randomBtn").addEventListener("click",randomPoem);

  $("#readerClose").addEventListener("click",closeReader);
  $("#readerPrev").addEventListener("click",()=>readerMove(-1));
  $("#readerNext").addEventListener("click",()=>readerMove(1));
  $("#reader").addEventListener("click",e=>{if(e.target.id==="reader"||e.target.classList.contains("reader-body"))closeReader()});
  document.addEventListener("keydown",e=>{
    if(!$("#reader").classList.contains("on"))return;
    if(e.key==="Escape")closeReader();
    if(e.key==="ArrowLeft")readerMove(-1);
    if(e.key==="ArrowRight")readerMove(1);
  });

  const tt=$("#toTop");
  window.addEventListener("scroll",()=>{tt.classList.toggle("on",window.scrollY>500)});
  tt.addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));
}
const META = {"title": "Перед сном", "subtitle": "тёплые стихи, чтобы читать на ночь", "lead": "Тихие стихи со всего света — не сухие признания, а красота: ночь, звёзды, тишина, нежность, лёгкий флирт. Чтобы перечитать один перед сном и уснуть с тёплой улыбкой.", "sub": "Открой вкладку страны или нажми «Случайный». Любой стих можно раскрыть в спокойном режиме чтения кнопкой «Читать».", "note": "<b>Честно о подборке.</b> «Топ мировой поэзии» здесь — кураторский выбор под настроение «перед сном», а не объективный рейтинг: такого рейтинга не существует. Тексты не сочинены — каждый сверен с реальной страницей источника (ссылка на карточке). Где произведение и перевод в общественном достоянии — даётся полный текст; где ещё действуют авторские права — короткий отрывок и ссылка. Страна у переводного стиха — родина автора оригинала; переводчик указан отдельно. Буква «ё» местами восстановлена для чтения.<br><br><b>Подборка растёт.</b> Наполняю её проверенными текстами; Россия пока идёт первой — её поэзия XIX — начала XX века в общественном достоянии даёт больше всего полных текстов. Остальные страны — через public-domain переводы (Фет, Бальмонт, Брюсов, Сологуб, Дельвиг, Мин, Кузмин, Нович и др.); где полного текста нет — отрывок и ссылка. Персидский раздел — фетовский цикл «Из Гафиза»: не буквальный Хафиз, а его знаменитые вольные подражания (о чём честно сказано в каждой карточке). Всего — десять стран: Россия, Германия, Франция, Англия, Италия, Персия, Китай, Япония, США, Испания. Латинскую Америку добавить честно не вышло — её переводы (Дарио, Нерво, Мистраль) почти все под копирайтом, а мрачное ради счёта я не беру."};
init();
</script>
</body>
</html>
